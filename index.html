  <script>
    (function() {
      var logs = [];
      window.addEventListener('error', function(e) {
        var msg = '[' + new Date().toLocaleTimeString() + '] ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno;
        if (e.error && e.error.stack) {
          msg += '\nStack: ' + e.error.stack;
        }
        logs.push(msg);
        showConsole();
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = '[' + new Date().toLocaleTimeString() + '] Unhandled Rejection: ' + (e.reason ? e.reason.message || e.reason : '');
        if (e.reason && e.reason.stack) {
          msg += '\nStack: ' + e.reason.stack;
        }
        logs.push(msg);
        showConsole();
      });
      function showConsole() {
        var body = document.body;
        if (!body) {
          window.addEventListener('DOMContentLoaded', showConsole);
          return;
        }
        var errorDiv = document.getElementById('debug-error-console');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-console';
          errorDiv.style.position = 'fixed';
          errorDiv.style.bottom = '0';
          errorDiv.style.left = '0';
          errorDiv.style.right = '0';
          errorDiv.style.background = '#fee2e2';
          errorDiv.style.color = '#991b1b';
          errorDiv.style.padding = '20px';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '12px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.borderTop = '3px solid #ef4444';
          errorDiv.style.maxHeight = '250px';
          errorDiv.style.overflowY = 'auto';
          errorDiv.style.whiteSpace = 'pre-wrap';
          body.appendChild(errorDiv);
        }
        errorDiv.textContent = '=== DEBUG ERROR CONSOLE ===\n' + logs.join('\n\n');
      }
    })();
  </script>

  <!-- React Root -->

  <!-- React Logic -->
  <script type="text/custom-babel">
    // ==========================================
    // 1. DATABASE SCHEMA & TRANSACTION ACTIONS
    // ==========================================

    const DB_NAME = 'PT_AR_MultiKarya_InternalDB';
    const DB_VERSION = 3; // Bumped version to version 3 to support chat_messages store

    const STORES = ['suppliers', 'barang', 'price_lists', 'customers', 'po', 'bukti_pembelian', 'invoice_jual', 'settings', 'logs', 'users', 'chat_messages'];
    
    // In-memory cache loaded from localStorage
    let fallbackDB = {};
    STORES.forEach(store => {
      try {
        const val = localStorage.getItem(`fallback_db_${store}`);
        fallbackDB[store] = val ? JSON.parse(val) : [];
      } catch (e) {
        fallbackDB[store] = [];
      }
    });

    let useFallback = false;

    // --- SUPABASE CLOUD DATABASE SETUP ---
    const DEFAULT_SUPABASE_URL = 'https://rmicglwqmulpbkvjvduw.supabase.co';
    const DEFAULT_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtaWNnbHdxbXVscGJrdmp2ZHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MjgwMjgsImV4cCI6MjEwMDMwNDAyOH0.Ypkd4CPXI4POYZ7hEi_29USe6eYXO_0vYnkywvNSBs0';
    let supabaseUrl = localStorage.getItem('pt_ar_supabase_url') || DEFAULT_SUPABASE_URL;
    let supabaseKey = localStorage.getItem('pt_ar_supabase_key') || DEFAULT_SUPABASE_KEY;
    let supabaseClient = null;

    function initSupabase() {
      if (supabaseUrl && supabaseKey && window.supabase) {
        try {
          supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
          console.log('Supabase client initialized successfully.');
        } catch(e) {
          console.error('Failed to initialize Supabase client:', e);
          supabaseClient = null;
        }
      } else {
        supabaseClient = null;
      }
    }
    initSupabase();

    // --- MYSQL DATABASE SETUP ---
    // Ubah URL di bawah ini dengan URL api.php / server Node.js Anda yang online agar semua HP/perangkat otomatis terhubung ke MySQL tanpa input manual di menu Pengaturan.
    const DEFAULT_MYSQL_API_URL = ''; 
    let mysqlApiUrl = localStorage.getItem('pt_ar_mysql_api_url') || DEFAULT_MYSQL_API_URL;

    function callMySQL(storeName, method, data = null, id = null) {
      let url = `${mysqlApiUrl}?store=${storeName}`;
      if (id) {
        url += `&id=${encodeURIComponent(id)}`;
      }
      const options = {
        method: method,
        headers: {
          'Content-Type': 'application/json'
        }
      };
      if (data) {
        options.body = JSON.stringify(data);
      }
      return fetch(url, options).then(res => {
        if (!res.ok) {
          return res.json().then(err => { throw new Error(err.error || 'API Request failed'); });
        }
        return res.json();
      });
    }

    function initDB() {
      if (useFallback) {
        return Promise.resolve(null);
      }
      return new Promise((resolve, reject) => {
        try {
          if (!window.indexedDB) {
            console.warn('IndexedDB not supported, falling back to localStorage');
            useFallback = true;
            resolve(null);
            return;
          }
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            const stores = [
              { name: 'suppliers', key: 'id', auto: true },
              { name: 'barang', key: 'id', auto: true },
              { name: 'price_lists', key: 'id', auto: true },
              { name: 'customers', key: 'id', auto: true },
              { name: 'po', key: 'id', auto: true },
              { name: 'bukti_pembelian', key: 'id', auto: true },
              { name: 'invoice_jual', key: 'id', auto: true },
              { name: 'logs', key: 'id', auto: true },
              { name: 'settings', key: 'id', auto: false },
              { name: 'users', key: 'id', auto: true },
              { name: 'chat_messages', key: 'id', auto: true }
            ];
            stores.forEach(store => {
              if (!db.objectStoreNames.contains(store.name)) {
                db.createObjectStore(store.name, { keyPath: store.key, autoIncrement: store.auto });
              }
            });
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => {
            console.warn('IndexedDB failed to open, falling back to localStorage:', e.target.error);
            useFallback = true;
            resolve(null);
          };
        } catch (err) {
          console.warn('IndexedDB threw error, falling back to localStorage:', err);
          useFallback = true;
          resolve(null);
        }
      });
    }

    function getAllFromStore(storeName) {
      if (mysqlApiUrl) {
        return callMySQL(storeName, 'GET');
      }
      if (supabaseClient) {
        return supabaseClient
          .from(storeName)
          .select('*')
          .then(async ({ data, error }) => {
            if (error) {
              console.error(`Supabase error fetching ${storeName}:`, error);
              throw error;
            }
            if (storeName === 'po' && data) {
              const { data: items, error: itemsErr } = await supabaseClient.from('po_items').select('*');
              if (!itemsErr && items) {
                data.forEach(p => {
                  p.items = items.filter(it => it.poId === p.id);
                });
              }
            } else if (storeName === 'bukti_pembelian' && data) {
              const { data: items, error: itemsErr } = await supabaseClient.from('bukti_pembelian_items').select('*');
              if (!itemsErr && items) {
                data.forEach(b => {
                  b.items = items.filter(it => it.buktiPembelianId === b.id).map(it => ({
                    barangId: it.barangId,
                    qty: it.qty,
                    unitCost: it.unitCost
                  }));
                });
              }
            } else if (storeName === 'invoice_jual' && data) {
              const { data: items, error: itemsErr } = await supabaseClient.from('invoice_jual_items').select('*');
              if (!itemsErr && items) {
                data.forEach(inv => {
                  inv.items = items.filter(it => it.invoiceJualId === inv.id);
                });
              }
            }
            return data || [];
          });
      }
      return initDB().then(db => {
        if (useFallback) {
          return fallbackDB[storeName] || [];
        }
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, 'readonly');
          const store = transaction.objectStore(storeName);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      });
    }

    function getFromStore(storeName, key) {
      if (mysqlApiUrl) {
        return callMySQL(storeName, 'GET', null, key);
      }
      if (supabaseClient) {
        return supabaseClient
          .from(storeName)
          .select('*')
          .eq('id', key)
          .maybeSingle()
          .then(async ({ data, error }) => {
            if (error) {
              console.error(`Supabase error fetching ${storeName}/${key}:`, error);
              throw error;
            }
            if (data) {
              if (storeName === 'po') {
                const { data: items, error: itemsErr } = await supabaseClient.from('po_items').select('*').eq('poId', data.id);
                if (!itemsErr && items) data.items = items;
              } else if (storeName === 'bukti_pembelian') {
                const { data: items, error: itemsErr } = await supabaseClient.from('bukti_pembelian_items').select('*').eq('buktiPembelianId', data.id);
                if (!itemsErr && items) {
                  data.items = items.map(it => ({
                    barangId: it.barangId,
                    qty: it.qty,
                    unitCost: it.unitCost
                  }));
                }
              } else if (storeName === 'invoice_jual') {
                const { data: items, error: itemsErr } = await supabaseClient.from('invoice_jual_items').select('*').eq('invoiceJualId', data.id);
                if (!itemsErr && items) data.items = items;
              }
            }
            return data;
          });
      }
      return initDB().then(db => {
        if (useFallback) {
          const list = fallbackDB[storeName] || [];
          return list.find(x => x.id === key);
        }
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, 'readonly');
          const store = transaction.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      });
    }

    function saveToStore(storeName, data) {
      if (mysqlApiUrl) {
        return callMySQL(storeName, 'POST', data).then(res => res.id);
      }
      if (supabaseClient) {
        const { items, ...mainData } = data;
        const originalId = mainData.id;
        if (mainData.id === undefined || mainData.id === null || mainData.id === '') {
          delete mainData.id;
        }
        let savePromise = supabaseClient
          .from(storeName)
          .upsert(mainData)
          .select();

        return savePromise.then(async ({ data: savedRows, error }) => {
          if (error) {
            console.error(`Supabase error saving ${storeName}:`, error);
            throw error;
          }
          const savedRow = (savedRows && savedRows.length > 0) ? savedRows[0] : null;
          const finalId = savedRow ? savedRow.id : originalId;
          if (finalId === undefined || finalId === null || finalId === '') {
            throw new Error(`Gagal mendapatkan ID untuk data yang disimpan di ${storeName}`);
          }
          if (storeName === 'po' && items) {
            await supabaseClient.from('po_items').delete().eq('poId', finalId);
            const itemsToInsert = items.map(it => ({
              poId: finalId,
              barangId: Number(it.barangId),
              qty: Number(it.qty),
              price: Number(it.price),
              total: Number(it.total)
            }));
            if (itemsToInsert.length > 0) {
              await supabaseClient.from('po_items').insert(itemsToInsert);
            }
          } else if (storeName === 'bukti_pembelian' && items) {
            await supabaseClient.from('bukti_pembelian_items').delete().eq('buktiPembelianId', finalId);
            const itemsToInsert = items.map(it => ({
              buktiPembelianId: finalId,
              barangId: Number(it.barangId),
              qty: Number(it.qty),
              unitCost: Number(it.unitCost)
            }));
            if (itemsToInsert.length > 0) {
              await supabaseClient.from('bukti_pembelian_items').insert(itemsToInsert);
            }
          } else if (storeName === 'invoice_jual' && items) {
            await supabaseClient.from('invoice_jual_items').delete().eq('invoiceJualId', finalId);
            const itemsToInsert = items.map(it => ({
              invoiceJualId: finalId,
              barangId: Number(it.barangId),
              qty: Number(it.qty),
              price: Number(it.price),
              total: Number(it.total),
              hpp: Number(it.hpp || 0)
            }));
            if (itemsToInsert.length > 0) {
              await supabaseClient.from('invoice_jual_items').insert(itemsToInsert);
            }
          }
          return finalId;
        });
      }
      return initDB().then(db => {
        if (useFallback) {
          const list = fallbackDB[storeName] || [];
          if (data.id === undefined) {
            const maxId = list.reduce((max, x) => (typeof x.id === 'number' && x.id > max ? x.id : max), 0);
            data.id = maxId + 1;
          }
          const idx = list.findIndex(x => x.id === data.id);
          if (idx >= 0) {
            list[idx] = data;
          } else {
            list.push(data);
          }
          fallbackDB[storeName] = list;
          try {
            localStorage.setItem(`fallback_db_${storeName}`, JSON.stringify(list));
          } catch(e) {}
          return data.id;
        }
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, 'readwrite');
          const store = transaction.objectStore(storeName);
          const request = store.put(data);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      });
    }

    function deleteFromStore(storeName, key) {
      if (mysqlApiUrl) {
        return callMySQL(storeName, 'DELETE', null, key);
      }
      if (supabaseClient) {
        return supabaseClient
          .from(storeName)
          .delete()
          .eq('id', key)
          .then(({ error }) => {
            if (error) {
              console.error(`Supabase error deleting ${storeName}/${key}:`, error);
              throw error;
            }
          });
      }
      return initDB().then(db => {
        if (useFallback) {
          const list = fallbackDB[storeName] || [];
          const filtered = list.filter(x => x.id !== key);
          fallbackDB[storeName] = filtered;
          try {
            localStorage.setItem(`fallback_db_${storeName}`, JSON.stringify(filtered));
          } catch(e) {}
          return;
        }
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, 'readwrite');
          const store = transaction.objectStore(storeName);
          const request = store.delete(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      });
    }

    // --- ATOMIC STRENGTH TRANSACTIONS ---

    // Save Bukti Pembelian: Simpan data penerimaan & tambah stok barang (Atomic)
    function saveBuktiPembelianTransaction(buktiData, poIdToComplete) {
      if (mysqlApiUrl) {
        return (async () => {
          const bpId = await saveToStore('bukti_pembelian', buktiData);
          if (poIdToComplete) {
            const po = await getFromStore('po', poIdToComplete);
            if (po) {
              po.status = 'Selesai';
              await saveToStore('po', po);
            }
          }
          for (const item of buktiData.items) {
            const brg = await getFromStore('barang', item.barangId);
            if (brg) {
              brg.stock = (Number(brg.stock) || 0) + Number(item.qty);
              await saveToStore('barang', brg);
            }
          }
          await saveToStore('logs', {
            timestamp: new Date().toISOString(),
            action: 'Tambah Bukti Pembelian',
            details: `Bukti Pembelian ${buktiData.receiptNumber} disimpan. Stok ditambahkan.`
          });
          return bpId;
        })();
      }
      if (supabaseClient) {
        return (async () => {
          const bpId = await saveToStore('bukti_pembelian', buktiData);
          if (poIdToComplete) {
            await supabaseClient.from('po').update({ status: 'Selesai' }).eq('id', poIdToComplete);
          }
          for (const item of buktiData.items) {
            const { data: brg } = await supabaseClient.from('barang').select('stock').eq('id', item.barangId).maybeSingle();
            if (brg) {
              const newStock = (Number(brg.stock) || 0) + Number(item.qty);
              await supabaseClient.from('barang').update({ stock: newStock }).eq('id', item.barangId);
            }
          }
          await saveToStore('logs', {
            timestamp: new Date().toISOString(),
            action: 'Tambah Bukti Pembelian',
            details: `Bukti Pembelian ${buktiData.receiptNumber} disimpan. Stok ditambahkan.`
          });
          return bpId;
        })();
      }
      if (useFallback) {
        const receipts = fallbackDB['bukti_pembelian'] || [];
        const maxId = receipts.reduce((max, x) => (typeof x.id === 'number' && x.id > max ? x.id : max), 0);
        buktiData.id = maxId + 1;
        receipts.push(buktiData);
        fallbackDB['bukti_pembelian'] = receipts;
        localStorage.setItem('fallback_db_bukti_pembelian', JSON.stringify(receipts));

        if (poIdToComplete) {
          const pos = fallbackDB['po'] || [];
          const po = pos.find(x => x.id === poIdToComplete);
          if (po) {
            po.status = 'Selesai';
            localStorage.setItem('fallback_db_po', JSON.stringify(pos));
          }
        }

        const barangs = fallbackDB['barang'] || [];
        buktiData.items.forEach(item => {
          const b = barangs.find(x => x.id === item.barangId);
          if (b) {
            b.stock = (Number(b.stock) || 0) + Number(item.qty);
          }
        });
        localStorage.setItem('fallback_db_barang', JSON.stringify(barangs));

        const logs = fallbackDB['logs'] || [];
        logs.push({
          id: Date.now(),
          timestamp: new Date().toISOString(),
          action: 'Tambah Bukti Pembelian',
          details: `Bukti Pembelian ${buktiData.receiptNumber} disimpan (Fallback). Stok ditambahkan.`
        });
        localStorage.setItem('fallback_db_logs', JSON.stringify(logs));

        return Promise.resolve();
      }
      return initDB().then(db => {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['bukti_pembelian', 'barang', 'po', 'logs'], 'readwrite');
          
          transaction.oncomplete = () => resolve();
          transaction.onerror = (e) => reject(e.target.error);

          const buktiStore = transaction.objectStore('bukti_pembelian');
          const barangStore = transaction.objectStore('barang');
          const poStore = transaction.objectStore('po');
          const logsStore = transaction.objectStore('logs');

          // 1. Simpan Bukti Pembelian
          buktiStore.add(buktiData);

          // 2. Update status PO jika diselesaikan
          if (poIdToComplete) {
            const poRequest = poStore.get(poIdToComplete);
            poRequest.onsuccess = (e) => {
              const po = e.target.result;
              if (po) {
                po.status = 'Selesai';

          // 3. Tambah Stok Barang secara looping
          buktiData.items.forEach(item => {

                b.stock = (Number(b.stock) || 0) + Number(item.qty);

    // Password Hash function using Web Crypto API (SHA-256)
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Helper Spelling Terbilang
    function formatTerbilangRupiah(amount) {
      if (amount === 0) return "Nol Rupiah";
      const words = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
      function convert(n) {
        if (n < 12) return words[n];
        if (n < 20) return words[n - 10] + " Belas";
        if (n < 100) return words[Math.floor(n / 10)] + " Puluh " + words[n % 10];
        if (n < 200) return "Seratus " + convert(n - 100);
        if (n < 1000) return words[Math.floor(n / 100)] + " Ratus " + convert(n % 100);
        if (n < 2000) return "Seribu " + convert(n - 1000);
        if (n < 1000000) return convert(Math.floor(n / 1000)) + " Ribu " + convert(n % 1000);
        if (n < 1000000000) return convert(Math.floor(n / 1000000)) + " Juta " + convert(n % 1000000);
        if (n < 1000000000000) return convert(Math.floor(n / 1000000000)) + " Miliar " + convert(n % 1000000000);
        return convert(Math.floor(n / 1000000000000)) + " Triliun " + convert(n % 1000000000000);
      }
      return convert(amount).replace(/\s+/g, ' ').trim() + " Rupiah";
    }

            showToast(`Selamat datang kembali, ${matchedUser.username}!`);
          } else {
            setError('Username atau password salah.');
          }
        } catch (err) {
          console.error(err);
          setError('Terjadi kesalahan sistem.');
        } finally {
          setIsLoading(false);
        }
      };

      const handleRequestOtp = async () => {
        setResetError('');
        setResetSuccess('');
        
        if (!resetUsername.trim()) {
          setResetError('Silakan masukkan username terlebih dahulu.');
          return;
        }

        try {
          const usersList = await getAllFromStore('users');
          const matchedUser = usersList.find(u => u.username === resetUsername.toLowerCase().trim());
          if (!matchedUser) {
            setResetError('Username tidak ditemukan.');
            return;
          }

          const wa = matchedUser.whatsapp;
          if (!wa) {
            setResetError('Akun ini tidak memiliki No. WhatsApp terdaftar. Silakan hubungi Administrator.');
            return;
          }

          const code = Math.floor(100000 + Math.random() * 900000).toString();
          setGeneratedOtp(code);
          setWhatsappNumber(wa);
          setOtpSent(true);

          const message = `Halo, berikut adalah Kode OTP Anda untuk reset password di aplikasi PT AR MULTI KARYA: *${code}*`;
          const cleanWa = wa.replace(/[^0-9]/g, '');
          const formattedWa = cleanWa.startsWith('0') ? '62' + cleanWa.slice(1) : cleanWa;
          
          window.open(`https://api.whatsapp.com/send?phone=${formattedWa}&text=${encodeURIComponent(message)}`, '_blank');
          setResetSuccess(`Kode OTP dikirimkan ke No. WhatsApp ${wa}. Silakan periksa pesan Anda.`);
        } catch (err) {
          console.error(err);
          setResetError('Gagal mengirimkan OTP.');
        }
      };

      const handleVerifyOtp = (e) => {
        e.preventDefault();
        setResetError('');
        setResetSuccess('');

        if (inputOtp.trim() === generatedOtp && generatedOtp !== '') {
          setOtpVerified(true);
          setResetSuccess('Kode OTP valid! Silakan masukkan kata sandi baru Anda.');
        } else {

      const handleResetPassword = async (e) => {
        e.preventDefault();
        setResetError('');
        setResetSuccess('');

        if (!otpVerified) {
          setResetError('Silakan verifikasi kode OTP terlebih dahulu.');
          return;
        }

        if (newPassword !== confirmNewPassword) {
          setResetError('Konfirmasi password tidak cocok.');
          return;

    // ==========================================
    // 2. MAIN REACT COMPONENT
    // ==========================================

    function App() {
      const [currentUser, setCurrentUser] = React.useState(null);
      const [currentModule, setCurrentModule] = React.useState('dashboard');
      const [darkMode, setDarkMode] = React.useState(false);
      const [isSidebarCollapsed, setIsSidebarCollapsed] = React.useState(false);
      
      // Tables Data
      const [suppliers, setSuppliers] = React.useState([]);
      const [barangList, setBarangList] = React.useState([]);
      const [priceLists, setPriceLists] = React.useState([]);
      const [customers, setCustomers] = React.useState([]);
      const [poList, setPoList] = React.useState([]);
      const [buktiPembelian, setBuktiPembelian] = React.useState([]);
      const [invoices, setInvoices] = React.useState([]);
      const [logs, setLogs] = React.useState([]);
      const [chatMessages, setChatMessages] = React.useState([]);
      const [settings, setSettings] = React.useState(DEFAULT_SETTINGS);

      // Toast states
      const [toasts, setToasts] = React.useState([]);

      // Price update alerts (weekly reminder)
      const [priceAlerts, setPriceAlerts] = React.useState([]);

      // Search & Filters
      const [globalSearch, setGlobalSearch] = React.useState('');

      // Reload databases helper
      const reloadData = async () => {
        const sup = await getAllFromStore('suppliers');
        const brg = await getAllFromStore('barang');
        const prc = await getAllFromStore('price_lists');
        const cust = await getAllFromStore('customers');
        const po = await getAllFromStore('po');
        const bkt = await getAllFromStore('bukti_pembelian');
        const inv = await getAllFromStore('invoice_jual');
        const lg = await getAllFromStore('logs');
        const chats = await getAllFromStore('chat_messages');
        const sett = await getFromStore('settings', 'pt_ar_multi_karya_profile');

        setSuppliers(sup);
        setBarangList(brg);
        setPriceLists(prc);
        setCustomers(cust);
        setPoList(po);
        setBuktiPembelian(bkt);
        setInvoices(inv);
        setLogs(lg.reverse().slice(0, 50));
        setChatMessages(chats);
        if (sett) setSettings(sett);

        // Check for items with no price list update in last 7 days
        const alerts = [];
        brg.forEach(b => {
          const history = prc.filter(p => p.barangId === b.id);
          if (history.length === 0) {
            alerts.push(b.name);
          } else {
            history.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
            const latestDate = new Date(history[0].effectiveDate);
            const diffTime = Math.abs(new Date() - latestDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays > 7) {
              alerts.push(b.name);
            }
          }
        });
        setPriceAlerts(alerts);
      };

      React.useEffect(() => {
        // Load saved session
        const saved = localStorage.getItem('pt_ar_user');
        if (saved) {
          try {
            setCurrentUser(JSON.parse(saved));
          } catch(e) {
            localStorage.removeItem('pt_ar_user');
          }
        }

        seedDatabaseIfEmpty().then(() => {
          reloadData();
        });
      }, []);

      // Inactivity auto-logout (20 minutes = 1200000 ms)
      React.useEffect(() => {
        if (!currentUser) return;

        let timeoutId;
        const INACTIVITY_LIMIT = 20 * 60 * 1000; // 20 minutes

        const resetTimer = () => {
          if (timeoutId) clearTimeout(timeoutId);
          timeoutId = setTimeout(() => {
            handleLogoutDueToInactivity();
          }, INACTIVITY_LIMIT);
        };

        const handleLogoutDueToInactivity = () => {
          setCurrentUser(null);
          localStorage.removeItem('pt_ar_user');
          showToast('Sesi Anda berakhir karena tidak ada aktivitas selama 20 menit.', 'error');
        };

        const events = ['mousemove', 'keydown', 'mousedown', 'touchstart', 'scroll', 'click'];
        
        resetTimer();

        events.forEach(event => {
          window.addEventListener(event, resetTimer);
        });

        return () => {
          if (timeoutId) clearTimeout(timeoutId);
          events.forEach(event => {
            window.removeEventListener(event, resetTimer);
          });
        };
      }, [currentUser]);

      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts([...toasts, { id, message, type }]);
        setTimeout(() => {
          setToasts(curr => curr.filter(t => t.id !== id));
        }, 3000);
      };

      const logActivity = async (action, details) => {
        const logData = {
          timestamp: new Date().toISOString(),
          action,
          details
        };
        await saveToStore('logs', logData);
        reloadData();
      };

      // Toggle Dark Mode (Forced off for right side cleanliness)
      React.useEffect(() => {
        document.documentElement.classList.remove('dark');
      }, []);

      // Dynamic charts logic helper
      React.useEffect(() => {
        if (currentModule === 'dashboard' && invoices.length > 0 && currentUser?.role !== 'sppg' && currentUser?.role !== 'mitra') {
          const ctx = document.getElementById('dashboardChart');
          if (ctx) {
            // Re-render chart
            // Aggregate values
            const totalRevenue = invoices.reduce((sum, item) => sum + (item.subtotal - (item.discount || 0)), 0);
            const totalHpp = invoices.reduce((sum, item) => sum + (item.hpp || 0), 0);
            const totalTax = invoices.reduce((sum, item) => sum + (item.taxAmount || 0), 0);
            const netProfit = totalRevenue - totalHpp - totalTax;

            if (window.myDashChart) window.myDashChart.destroy();
            window.myDashChart = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: ['Pendapatan (Sales)', 'Harga Pokok (HPP)', 'Pajak PT 2%', 'Laba Bersih'],
                datasets: [{
                  label: 'Nominal Rupiah (IDR)',
                  data: [totalRevenue, totalHpp, totalTax, netProfit],
                  backgroundColor: [
                    'rgba(34, 197, 94, 0.65)',
                    'rgba(239, 68, 68, 0.65)',
                    'rgba(245, 158, 11, 0.65)',
                    'rgba(59, 130, 246, 0.65)'
                  ],
                  borderColor: [
                    '#22c55e',
                    '#ef4444',
                    '#f59e0b',
                    '#3b82f6'
                  ],
                  borderWidth: 1.5,
                  borderRadius: 8
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false }
                },
                scales: {
                  y: {
                    ticks: {
                      callback: function(value) {
                        return 'Rp ' + (value >= 1e6 ? (value / 1e6) + 'M' : value.toLocaleString('id-ID'));
                      }
                    }
                  }
                }
              }
            });
          }
        }
      }, [currentModule, invoices, buktiPembelian, currentUser]);

      const getNavigationItems = (role) => {
        const allItems = [
          { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard', roles: ['admin', 'finance', 'sppg', 'mitra'] },
          { id: 'supplier', name: 'Master Supplier', icon: 'truck', roles: ['admin', 'finance'] },
          { id: 'bukti_pembelian', name: 'Bukti Pembelian (Supplier)', icon: 'receipt', roles: ['admin', 'finance'] },
          { id: 'barang', name: 'Master Barang', icon: 'package', roles: ['admin', 'finance'] },
          { id: 'price_list', name: 'Price List', icon: 'tags', roles: ['admin', 'finance', 'sppg', 'mitra'] },
          { id: 'kalkulator_po', name: 'Kalkulator Budget PO', icon: 'calculator', roles: ['admin', 'sppg', 'mitra'] },
          { id: 'customer', name: 'Mitra / Customer', icon: 'users', roles: ['admin', 'finance'] },
          { id: 'po', name: 'Purchase Order (PO)', icon: 'file-text', roles: ['admin', 'finance', 'sppg', 'mitra'] },
          { id: 'invoice_jual', name: (role === 'sppg' || role === 'mitra') ? 'Bukti Penerimaan Barang' : 'Invoice Penjualan', icon: (role === 'sppg' || role === 'mitra') ? 'clipboard-check' : 'file-invoice-dollar', roles: ['admin', 'finance', 'sppg', 'mitra'] },
          { id: 'rekap_laba_rugi', name: 'Laba Rugi (Profit/Loss)', icon: 'trending-up', roles: ['admin', 'finance'] },
          { id: 'komunikasi', name: 'Komunikasi (Pesan)', icon: 'messages-square', roles: ['admin', 'finance', 'sppg', 'mitra'] },
          { id: 'users', name: 'Manajemen Akun', icon: 'user-cog', roles: ['admin'] },
          { id: 'audit_logs', name: 'Audit Trails', icon: 'shield-alert', roles: ['admin'] },
          { id: 'settings', name: 'Pengaturan Sistem', icon: 'sliders', roles: ['admin'] },
          { id: 'profile_settings', name: 'Pengaturan Akun', icon: 'settings', roles: ['admin', 'finance', 'sppg', 'mitra'] }
        ];
        return allItems.filter(item => item.roles.includes(role));
      };

      const handleLogin = (user) => {
        setCurrentUser(user);
        localStorage.setItem('pt_ar_user', JSON.stringify(user));
      };

      const handleLogout = () => {
        if (confirm('Apakah Anda yakin ingin keluar?')) {
          setCurrentUser(null);
          localStorage.removeItem('pt_ar_user');
        }
      };

      React.useEffect(() => {
        if (currentUser) {
          const allowed = getNavigationItems(currentUser.role).map(item => item.id);
          if (!allowed.includes(currentModule)) {
            setCurrentModule('dashboard');
          }
        }
      }, [currentUser, currentModule]);

      React.useEffect(() => {
        lucide.createIcons();
      });

      if (!currentUser) {
        return <LoginView onLogin={handleLogin} showToast={showToast} />;
      }

      return (
        <div className="flex h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans">
          
          {/* TOAST LISTENER CONTAINER */}
          <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-2 max-w-sm pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} className={`p-4 rounded-xl shadow-lg border text-xs font-semibold pointer-events-auto animate-slide-in-right flex items-center gap-3 ${
                t.type === 'success' ? 'bg-green-50 border-green-200 text-green-700 dark:bg-green-950/30 dark:border-green-900 dark:text-green-300' :
                t.type === 'error' ? 'bg-red-50 border-red-200 text-red-700 dark:bg-red-955/30 dark:border-red-900 dark:text-red-300' :
                'bg-slate-50 border-slate-200 text-slate-700 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-350'
              }`}>
                <span className="flex-1">{t.message}</span>
              </div>
            ))}
          </div>

          {/* SIDEBAR NAVIGATION */}
          <aside className={`${isSidebarCollapsed ? 'w-16' : 'w-64'} bg-gradient-to-b from-sky-500 via-sky-600 to-sky-700 text-white border-r border-sky-600/30 flex flex-col justify-between flex-shrink-0 no-print shadow-2xl relative z-25 transition-all duration-300`}>
            <div>
              {/* Header Title branding */}
              <div className="p-6 border-b border-red-100 flex items-center gap-3 justify-center bg-red-50/95">
                <img src="logo.png" alt="AR Logo" className="w-8 h-8 object-contain rounded-lg bg-white p-0.5 border border-red-200" />
                {!isSidebarCollapsed && (
                  <div className="animate-fade-in">
                    <h1 className="font-extrabold text-[10px] tracking-wide leading-none text-slate-950 uppercase">AR MULTI KARYA</h1>
                    <span className="text-[8px] text-slate-600 font-bold uppercase tracking-wider block mt-0.5">Borobudur Portal</span>
                  </div>
                )}
              </div>

              {/* Navigation Menu */}
              <nav className="p-2 space-y-1">
                {getNavigationItems(currentUser.role).map(item => {
                  const isPoModule = item.id === 'po';
                  const isInvoiceModule = item.id === 'invoice_jual';
                  const isChatModule = item.id === 'komunikasi';
                  
                  let pendingPoCount = 0;
                  if (isPoModule) {
                    pendingPoCount = poList.filter(po => {
                      const isCustomerOrSppg = currentUser?.role === 'mitra' || currentUser?.role === 'sppg';
                      if (isCustomerOrSppg) {
                        let isMyPo = false;
                        if (currentUser?.customerId) {
                          isMyPo = po.customerId === currentUser.customerId;
                        } else {
                          isMyPo = po.createdBy === currentUser?.username || 
                                   (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                                   (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
                        }
                        if (!isMyPo) return false;
                      }
                      return po.status !== 'Selesai' && po.status !== 'Lunas' && po.status !== 'Dibatalkan';
                    }).length;
                  }

                  let pendingInvoiceCount = 0;
                  if (isInvoiceModule) {
                    pendingInvoiceCount = poList.filter(po => {
                      if (po.status !== 'Selesai') return false;
                      const isCustomerOrSppg = currentUser?.role === 'mitra' || currentUser?.role === 'sppg';
                      if (isCustomerOrSppg) {
                        let isMyPo = false;
                        if (currentUser?.customerId) {
                          isMyPo = po.customerId === currentUser.customerId;
                        } else {
                          isMyPo = po.createdBy === currentUser?.username || 
                                   (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                                   (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
                        }
                        if (!isMyPo) return false;
                      }
                      const hasInvoice = invoices.some(inv => Number(inv.refPoId) === Number(po.id));
                      return !hasInvoice;
                    }).length;
                  }

                  let pendingChatCount = 0;
                  if (isChatModule) {
                    const channelIds = ['koordinasi-umum', 'divisi-po-logistik'];
                    const directPartners = ['admin', 'finance', 'sppg', 'mitra'];
                    pendingChatCount = chatMessages.filter(msg => {
                      if (msg.sender === currentUser.username) return false;
                      const readList = msg.readBy || [];
                      if (readList.includes(currentUser.username)) return false;
                      if (channelIds.includes(msg.channelId)) return true;
                      if (msg.channelId === 'direct' && msg.receiver === currentUser.username && directPartners.includes(msg.sender)) return true;
                      return false;
                    }).length;
                  }

                  const showBadge = (isPoModule && pendingPoCount > 0) || 
                                    (isInvoiceModule && pendingInvoiceCount > 0) ||
                                    (isChatModule && pendingChatCount > 0);
                                    
                  const badgeCount = isPoModule ? pendingPoCount : (isInvoiceModule ? pendingInvoiceCount : pendingChatCount);

                  return (
                    <button
                      key={item.id}
                      onClick={() => {
                        setCurrentModule(item.id);
                        setGlobalSearch('');
                      }}
                      title={isSidebarCollapsed ? `${item.name}${showBadge ? ` (${badgeCount} tertunda)` : ''}` : ""}
                      className={`w-full flex items-center ${isSidebarCollapsed ? 'justify-center px-0 relative' : 'gap-3 px-3.5'} py-2.5 rounded-xl text-xs font-semibold tracking-wide transition-all ${
                        currentModule === item.id 
                          ? 'bg-white text-sky-700 shadow-md scale-[1.02] border border-white/20' 
                          : 'text-sky-100 hover:text-white hover:bg-white/10'
                      }`}
                    >
                      <i data-lucide={item.icon} className="w-4 h-4"></i>
                      {!isSidebarCollapsed && <span className="animate-fade-in flex-1 text-left">{item.name}</span>}
                      
                      {showBadge && (
                        isSidebarCollapsed ? (
                          <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 border border-sky-600 rounded-full animate-pulse"></span>
                        ) : (
                          <span className="ml-auto bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full leading-none shadow-sm shadow-red-950/20">
                            {badgeCount}
                          </span>
                        )
                      )}
                    </button>
                  );
                })}
              </nav>
            </div>

            {/* User details and Quick settings */}
            <div className="p-4 border-t border-white/15 space-y-3 bg-black/10">
              <div className={`flex items-center ${isSidebarCollapsed ? 'flex-col gap-3 justify-center' : 'justify-between'} pt-2`}>
                <div className="flex items-center gap-2">
                  {currentUser.profilePic ? (
                    <img src={currentUser.profilePic} className="w-7 h-7 rounded-full object-cover flex-shrink-0 border border-white/20" />
                  ) : (
                    <div className="w-7 h-7 rounded-full bg-white text-sky-700 flex items-center justify-center font-bold text-xs uppercase flex-shrink-0">
                      {currentUser.username[0]}
                    </div>
                  )}
                  {!isSidebarCollapsed && (
                    <div className="animate-fade-in truncate max-w-[100px]">
                      <div className="font-bold text-[10px] capitalize leading-none text-white mb-0.5">{currentUser.username}</div>
                      <span className="text-[7px] text-sky-200 font-bold uppercase tracking-wider">{currentUser.role}</span>
                    </div>
                  )}
                </div>
                <button 
                  onClick={handleLogout}
                  title="Logout"
                  className="p-1.5 rounded-lg text-sky-100 hover:text-white hover:bg-white/10 transition-colors"
                >
                  <i data-lucide="log-out" className="w-3.5 h-3.5"></i>
                </button>
              </div>
            </div>
          </aside>

          {/* MAIN PAGE AREA */}
          <main className="flex-1 flex flex-col overflow-hidden">
            
            {/* Topbar controls */}
            <header className="h-16 border-b border-slate-150 bg-white flex items-center justify-between px-6 flex-shrink-0 no-print">
              <div className="flex items-center gap-3">
                <button 
                  onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                  className="p-2 rounded-xl hover:bg-slate-50 text-slate-500 hover:text-slate-800 transition-all border border-slate-100 flex items-center justify-center focus:outline-none"
                  title={isSidebarCollapsed ? "Buka Sidebar" : "Persempit Sidebar"}
                >
                  <i data-lucide={isSidebarCollapsed ? "menu" : "align-left"} className="w-4 h-4"></i>
                </button>
                <h2 className="font-bold text-sm tracking-wide capitalize text-slate-850">
                  {currentModule.replace('_', ' ')}
                </h2>
              </div>
              <div className="flex items-center gap-4">
                <div className="relative">
                  <span className="absolute inset-y-0 left-3 flex items-center text-slate-400">
                    <i data-lucide="search" className="w-3.5 h-3.5"></i>
                  </span>
                  <input
                    type="text"
                    value={globalSearch}
                    onChange={(e) => setGlobalSearch(e.target.value)}
                    placeholder="Pencarian cepat..."
                    className="w-64 pl-9 pr-4 py-1.5 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 rounded-xl focus:border-primary-500 focus:outline-none text-xs dark:text-white"
                  />
                </div>
                <div className="h-6 w-px bg-slate-200 dark:bg-slate-800" />
                <span className="text-[10px] bg-amber-50 text-amber-700 dark:bg-amber-950/20 dark:text-amber-400 px-2 py-0.5 rounded-full font-bold border border-amber-200 dark:border-amber-900/40">
                  Lokal (Offline)
                </span>
              </div>
            </header>

            {/* Scrollable Body Content */}
            <div className="flex-1 overflow-y-auto p-8">
              {/* React renders different views inside index.html based on state */}
              {currentModule === 'dashboard' && (
                <DashboardView 
                  suppliers={suppliers} 
                  barangList={barangList} 
                  customers={customers} 
                  poList={poList} 
                  buktiPembelian={buktiPembelian} 
                  invoices={invoices} 
                  logs={logs}
                  showToast={showToast}
                  priceAlerts={priceAlerts}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'supplier' && (
                <SupplierModule 
                  suppliers={suppliers} 
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'barang' && (
                <BarangModule 
                  barangList={barangList} 
                  suppliers={suppliers} 
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'price_list' && (
                <PriceListModule 
                  priceLists={priceLists} 
                  barangList={barangList} 
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  priceAlerts={priceAlerts}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'po' && (
                <PurchaseOrderModule 
                  poList={poList} 
                  suppliers={suppliers} 
                  barangList={barangList} 
                  priceLists={priceLists}
                  customers={customers}
                  invoices={invoices}
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'bukti_pembelian' && (
                <BuktiPembelianModule 
                  buktiPembelian={buktiPembelian} 
                  poList={poList} 
                  barangList={barangList} 
                  suppliers={suppliers}
                  customers={customers}
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'customer' && (
                <CustomerModule 
                  customers={customers} 
                  globalSearch={globalSearch} 
                  reloadData={reloadData} 
                  logActivity={logActivity}
                  showToast={showToast}
                  currentUser={currentUser}
                />
              )}
              {currentModule === 'invoice_jual' && (
                currentUser?.role === 'sppg' ? (
                  <PurchaseOrderModule 
                    poList={poList} 
                    suppliers={suppliers} 
                    barangList={barangList} 
                    priceLists={priceLists}
                    customers={customers} 
                    invoices={invoices}
                    globalSearch={globalSearch} 
                    reloadData={reloadData} 
                    logActivity={logActivity}
                    showToast={showToast}
                    currentUser={currentUser}
                    onlyShowShipments={true}
                  />
                ) : (
                  <InvoiceJualModule 
                    invoices={invoices} 
                    customers={customers} 
                    barangList={barangList} 
                    priceLists={priceLists}
                    poList={poList}
                    globalSearch={globalSearch} 
                    reloadData={reloadData} 
                    logActivity={logActivity}
                    showToast={showToast}
                    settings={settings}
                    currentUser={currentUser}

              {currentModule === 'rekap_laba_rugi' && (
                <RekapLabaRugiModule

    }

    // ==========================================
    // 3. DASHBOARD VIEW MODULE
    // ==========================================
    function DashboardView({ suppliers, barangList, customers, poList, buktiPembelian, invoices, logs, showToast, priceAlerts, currentUser }) {
      
      const isCustomerOrSppg = currentUser?.role === 'sppg' || currentUser?.role === 'mitra';

      // SPPG or Customer PO filtering and calculations
      const userPOs = poList.filter(po => {
        if (currentUser?.customerId) {
          return po.customerId === currentUser.customerId;
        }
        if (currentUser?.role === 'sppg') {
          return po.createdBy === currentUser.username ||
                 (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                 (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
        }
        if (currentUser?.role === 'mitra') {
          const matchedCust = customers.find(c => 
            c.name.toLowerCase() === currentUser.username.toLowerCase() || 
            c.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
            c.company.toLowerCase().includes(currentUser.username.toLowerCase())
          );
          return matchedCust ? po.customerId === matchedCust.id : false;
        }
        return false;
      });

      const totalPOAmount = userPOs.reduce((sum, po) => sum + (po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0)), 0);
      const totalPOCount = userPOs.length;

      const pendingPOs = userPOs.filter(po => 
        po.status === 'Draft' || 
        po.status === 'Belum diproses' || 
        po.status === 'Belum di proses' || 
        po.status === 'Pending'
      );
      const totalPendingAmount = pendingPOs.reduce((sum, po) => sum + (po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0)), 0);

      const completedPOs = userPOs.filter(po => 
        po.status === 'Selesai' || 
        po.status === 'Lunas' || 
        po.status === 'Dikirim' || 
        po.status === 'Diterima Parsial'
      );
      const totalCompletedAmount = completedPOs.reduce((sum, po) => sum + (po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0)), 0);

      if (isCustomerOrSppg) {
        return (
          <div className="space-y-8 animate-fade-in">
            {/* Welcoming Banner */}
            <div className="bg-gradient-to-r from-primary-600 to-primary-800 text-white p-8 rounded-3xl shadow-lg border border-primary-750 flex justify-between items-center relative overflow-hidden">
              <div className="space-y-2 z-10">
                <span className="text-[10px] uppercase font-bold bg-white/20 px-3 py-1 rounded-full tracking-wider border border-white/10">Portal Mitra & SPPG</span>
                <h2 className="text-2xl font-extrabold tracking-tight">
                  Halo, {currentUser?.username}!
                </h2>
                <p className="text-xs text-primary-100 max-w-lg font-medium leading-relaxed">
                  Selamat datang di dashboard pemesanan Anda. Di sini Anda dapat memantau akumulasi transaksi Purchase Order (PO) yang diajukan ke PT AR MULTI KARYA.
                </p>
              </div>
              <div className="absolute -right-10 -bottom-10 opacity-10 pointer-events-none transform rotate-12 scale-150">
                <i data-lucide="file-text" className="w-64 h-64"></i>
              </div>
            </div>

            {/* KPI Cards */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white dark:bg-slate-955 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
                <div>
                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Total Akumulasi PO</span>
                  <div className="mt-2 flex items-baseline justify-between">
                    <span className="text-2xl font-extrabold text-primary-600 dark:text-primary-400">{formatRupiah(totalPOAmount)}</span>
                    <span className="text-[8px] bg-primary-50 text-primary-700 dark:bg-primary-955/20 dark:text-primary-400 border border-primary-150 dark:border-primary-900 rounded px-1.5 py-0.5 font-bold">Semua Transaksi</span>
                  </div>
                </div>
                <div className="text-[10px] text-slate-400 font-semibold mt-4">
                  Akumulasi {totalPOCount} transaksi pemesanan ke AR Multi Karya
                </div>
              </div>

              <div className="bg-white dark:bg-slate-955 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
                <div>

              {userPOs.length === 0 ? (

                      {userPOs.slice(0, 5).map(po => {

                        return (

                                po.status === 'Selesai' ? 'bg-teal-100 text-teal-700' :

                  </table>
                </div>
              )}
            </div>
          </div>
        );
      }
      
      const totalRevenue = invoices.reduce((sum, item) => sum + (item.subtotal - (item.discount || 0)), 0);
      const totalHpp = invoices.reduce((sum, item) => sum + (item.hpp || 0), 0);
      const totalTax = invoices.reduce((sum, item) => sum + (item.taxAmount || 0), 0);
      const netProfit = totalRevenue - totalHpp - totalTax;

      // Low Stock items
      const lowStockBarang = barangList.filter(b => b.stock <= 50);

      return (
        <div className="space-y-8 animate-fade-in">
          {priceAlerts && priceAlerts.length > 0 && (
            <div className="p-4 bg-amber-50 dark:bg-amber-955/20 border border-amber-200 dark:border-amber-900/40 text-amber-850 dark:text-amber-300 rounded-2xl text-xs font-semibold flex items-start gap-3 no-print">
              <i data-lucide="bell" className="w-4 h-4 text-amber-550 flex-shrink-0 mt-0.5 animate-bounce"></i>
              <div>
                <span className="font-bold">Pengingat Harga Mingguan:</span> Terdapat <strong>{priceAlerts.length} barang</strong> yang harga beli/jual standardnya belum diperbarui lebih dari 7 hari: <span className="underline">{priceAlerts.join(', ')}</span>. Harap perbarui katalog harga.

          )}

          {/* KPI Dashboard Grid */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
              <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Penjualan (Revenue)</span>
              <div className="mt-2 flex items-baseline justify-between">
                <span className="text-xl font-extrabold text-green-600">{formatRupiah(totalRevenue)}</span>
                <span className="text-[8px] bg-green-50 text-green-700 dark:bg-green-950/20 dark:text-green-400 border border-green-150 dark:border-green-900 rounded px-1 font-bold">Sales</span>
              </div>
            </div>
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
              <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Harga Pokok Penjualan (HPP)</span>
              <div className="mt-2 flex items-baseline justify-between">
                <span className="text-xl font-extrabold text-red-500">{formatRupiah(totalHpp)}</span>
                <span className="text-[8px] bg-red-50 text-red-700 dark:bg-red-955/20 dark:text-red-400 border border-red-150 dark:border-red-900 rounded px-1 font-bold">HPP</span>
              </div>
            </div>
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
              <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Pajak PT 2% (Paid Tax)</span>
              <div className="mt-2 flex items-baseline justify-between">
                <span className="text-xl font-extrabold text-amber-500">{formatRupiah(totalTax)}</span>
                <span className="text-[8px] bg-amber-50 text-amber-700 dark:bg-amber-955/20 dark:text-amber-400 border border-amber-150 dark:border-amber-900 rounded px-1 font-bold">Tax 2%</span>
              </div>
            </div>
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 flex flex-col justify-between shadow-sm">
              <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Laba Bersih Perusahaan</span>
              <div className="mt-2 flex items-baseline justify-between">
                <span className="text-xl font-extrabold text-blue-500">{formatRupiah(netProfit)}</span>
                <span className={`text-[8px] border rounded px-1 font-bold ${
                  netProfit >= 0 
                    ? 'bg-blue-50 text-blue-700 dark:bg-blue-955/20 dark:text-blue-400 border-blue-150 dark:border-blue-900' 
                    : 'bg-red-50 text-red-700 dark:bg-red-955/20 dark:text-red-400 border-red-150 dark:border-red-900'
                }`}>Profit</span>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            {/* Chart Area */}
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 md:col-span-2 shadow-sm flex flex-col justify-between">
              <div>
                <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Visualisasi Neraca Keuangan</h3>
                <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Analisis Relasional Laba Rugi</span>
              </div>
              <div className="relative h-64 mt-4">
                <canvas id="dashboardChart"></canvas>
              </div>
            </div>

            {/* Stok Kritis Alert Grid */}
            <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm flex flex-col justify-between">
              <div>
                <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Pemberitahuan Stok Terbatas</h3>
                <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Barang dengan stok &le; 50 unit</span>
              </div>
              
              <div className="flex-1 overflow-y-auto max-h-56 mt-4 pr-1">
                {lowStockBarang.length === 0 ? (
                  <div className="text-center text-xs text-slate-400 py-10">
                    Semua stok barang tercukupi (&gt; 50 unit).
                  </div>
                ) : (
                  <div className="space-y-2">
                    {lowStockBarang.map(b => (
                      <div key={b.id} className="flex justify-between items-center bg-slate-50 dark:bg-slate-900/60 p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 text-xs">
                        <div>
                          <div className="font-bold">{b.name}</div>
                          <span className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">{b.code}</span>
                        </div>
                        <div className="text-right">
                          <span className={`px-2 py-0.5 rounded text-[10px] font-extrabold ${
                            b.stock === 0 ? 'bg-red-50 text-red-650' : 'bg-amber-50 text-amber-650'
                          }`}>
                            {b.stock} {b.unit}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Quick Logs Summary */}
          <div className="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm">
            <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider mb-4">Log Aktivitas Keamanan Sistem (Audit Trail)</h3>
            <div className="space-y-3">
              {logs.slice(0, 5).map((log, idx) => (
                <div key={idx} className="flex justify-between items-start text-xs border-b border-slate-100 dark:border-slate-900 pb-2">
                  <div className="flex gap-3">
                    <span className="text-slate-400 font-mono text-[10px]">
                      {new Date(log.timestamp).toLocaleTimeString('id-ID')}
                    </span>
                    <div>
                      <span className="font-bold text-slate-700 dark:text-slate-300 mr-2">[{log.action}]</span>
                      <span className="text-slate-550 dark:text-slate-400 font-medium">{log.details}</span>
                    </div>
                  </div>
                  <span className="text-[9px] text-slate-400 font-semibold">{new Date(log.timestamp).toLocaleDateString('id-ID')}</span>

              ))}

        </div>
      );
    }

    // ==========================================
    // 4. MASTER SUPPLIER VIEW MODULE
    // ==========================================
    function SupplierModule({ suppliers, globalSearch, reloadData, logActivity, showToast, currentUser }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const [modalOpen, setModalOpen] = React.useState(null); // 'add', 'edit'
      const [editSupplier, setEditSupplier] = React.useState(null);

      // Fields
      const [name, setName] = React.useState('');
      const [code, setCode] = React.useState('');
      const [phone, setPhone] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [address, setAddress] = React.useState('');

      const openModal = (mode, sup = null) => {
        if (mode === 'edit' && sup) {
          setEditSupplier(sup);
          setName(sup.name);
          setCode(sup.code);
          setPhone(sup.phone);
          setEmail(sup.email);
          setAddress(sup.address);
          setModalOpen('edit');
        } else {
          setEditSupplier(null);
          setName('');
          const newCode = 'SPL-' + String(suppliers.length + 1).padStart(3, '0');
          setCode(newCode);
          setPhone('');
          setEmail('');
          setAddress('');
          setModalOpen('add');
        }
      };

      const handleSave = async (e) => {
        e.preventDefault();
        const data = {
          name,
          code,
          phone,
          email,
          address
        };

        if (modalOpen === 'edit') {
          data.id = editSupplier.id;
          await saveToStore('suppliers', data);
          await logActivity('Ubah Supplier', `Supplier ${name} (${code}) diperbarui.`);
          showToast(`Supplier ${name} berhasil diperbarui.`);
        } else {
          await saveToStore('suppliers', data);
          await logActivity('Tambah Supplier', `Supplier baru ${name} (${code}) ditambahkan.`);
          showToast(`Supplier ${name} berhasil ditambahkan.`);
        }

        setModalOpen(null);
        reloadData();
      };

      const handleDelete = async (sup) => {
        if (confirm(`Apakah Anda yakin ingin menghapus Supplier ${sup.name}?`)) {
          await deleteFromStore('suppliers', sup.id);
          await logActivity('Hapus Supplier', `Supplier ${sup.name} (${sup.code}) dihapus.`);
          showToast(`Supplier ${sup.name} telah dihapus.`, 'error');
          reloadData();
        }
      };

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Kode, Nama, No. Telepon, Email, Alamat
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rCode = row[0] ? String(row[0]).trim() : '';
              const rName = row[1] ? String(row[1]).trim() : '';
              const rPhone = row[2] ? String(row[2]).trim() : '';
              const rEmail = row[3] ? String(row[3]).trim() : '';
              const rAddress = row[4] ? String(row[4]).trim() : '';

              if (!rCode || !rName) continue;

              const newSupplier = {
                code: rCode,
                name: rName,
                phone: rPhone,
                email: rEmail,
                address: rAddress
              };

              const existing = suppliers.find(s => s.code.toLowerCase() === rCode.toLowerCase());
              if (existing) {
                newSupplier.id = existing.id;
              }

              await saveToStore('suppliers', newSupplier);
              importedCount++;
            }

            await logActivity('Import Supplier', `${importedCount} supplier diimpor dari file Excel.`);
            showToast(`${importedCount} supplier berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Kode Supplier', 'Nama Supplier', 'No. Telepon', 'Email', 'Alamat']
        ];
        suppliers.forEach(s => {
          rows.push([
            s.code,
            s.name,
            s.phone || '',
            s.email || '',
            s.address || ''
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Suppliers');
        XLSX.writeFile(wb, 'Data_Supplier_PT_AR.xlsx');
        logActivity('Export Supplier', 'Data supplier diexport ke Excel.');
        showToast('Data supplier berhasil diexport ke Excel.');
      };

      const filtered = suppliers.filter(s => 
        s.name.toLowerCase().includes(globalSearch.toLowerCase()) ||
        s.code.toLowerCase().includes(globalSearch.toLowerCase()) ||
        s.address.toLowerCase().includes(globalSearch.toLowerCase())
      );

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Manajemen Supplier (Vendor)</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Master data supplier (pemasok) PT AR MULTI KARYA</span>
            </div>
            
            <div className="flex gap-2">
              {!isReadOnly && (
                <label className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-pointer flex items-center gap-1.5 border border-slate-250 dark:border-slate-700">
                  <i data-lucide="file-input" className="w-3.5 h-3.5"></i> Import Excel
                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>
              )}
              <button 
                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>
              {!isReadOnly && (
                <button 
                  onClick={() => openModal('add')}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/15 flex items-center gap-2"
                >
                  <i data-lucide="plus" className="w-3.5 h-3.5"></i> Tambah Supplier
                </button>
              )}
            </div>
          </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm overflow-hidden">
            <table className="w-full text-left border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-850 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">Kode</th>
                  <th className="py-4 px-6">Nama Supplier</th>
                  <th className="py-4 px-6">No. Telepon</th>
                  <th className="py-4 px-6">Email</th>
                  <th className="py-4 px-6">Alamat</th>
                  {!isReadOnly && <th className="py-4 px-6 text-right">Aksi</th>}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {filtered.length === 0 ? (
                  <tr>
                    <td colSpan={isReadOnly ? "5" : "6"} className="py-8 text-center text-slate-400 font-medium">Tidak ada data supplier ditemukan.</td>
                  </tr>
                ) : (
                  filtered.map(sup => (
                    <tr key={sup.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                      <td className="py-4 px-6 font-mono font-bold text-primary-600 dark:text-primary-400">{sup.code}</td>
                      <td className="py-4 px-6 font-extrabold text-slate-850 dark:text-white">{sup.name}</td>
                      <td className="py-4 px-6 font-medium text-slate-500">{sup.phone}</td>
                      <td className="py-4 px-6 font-medium text-slate-500">{sup.email}</td>
                      <td className="py-4 px-6 text-slate-500 font-semibold max-w-xs truncate">{sup.address}</td>
                      {!isReadOnly && (
                        <td className="py-4 px-6 text-right">
                          <div className="inline-flex gap-2">
                            <button 
                              onClick={() => openModal('edit', sup)}
                              className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-primary-600 hover:border-primary-200 dark:hover:border-primary-900"
                            >
                              <i data-lucide="edit-3" className="w-3.5 h-3.5"></i>
                            </button>
                            <button 
                              onClick={() => handleDelete(sup)}
                              className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-red-655 hover:border-red-200 dark:hover:border-red-950"
                            >
                              <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                            </button>
                          </div>
                        </td>
                      )}
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {/* Form Modal */}
          {modalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-lg rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-850 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">{modalOpen === 'add' ? 'Tambah Supplier Baru' : 'Ubah Data Supplier'}</h4>
                  <button onClick={() => setModalOpen(null)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                <form onSubmit={handleSave} className="p-6 space-y-4 text-xs font-semibold">
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Kode Supplier</label>
                    <input type="text" readOnly value={code} className="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white font-mono" />
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Nama Supplier *</label>
                    <input type="text" required value={name} onChange={(e) => setName(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                  </div>
