    // ==========================================
    // 5. MASTER BARANG VIEW MODULE
    // ==========================================
    function BarangModule({ barangList, suppliers, globalSearch, reloadData, logActivity, showToast, currentUser }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const [modalOpen, setModalOpen] = React.useState(null); // 'add', 'edit'
      const [editBarang, setEditBarang] = React.useState(null);

      // Fields
      const [name, setName] = React.useState('');
      const [code, setCode] = React.useState('');
      const [supplierId, setSupplierId] = React.useState('');
      const [unit, setUnit] = React.useState('SAK');
      const [stock, setStock] = React.useState(0);
      const [kategori, setKategori] = React.useState('Bahan Baku');
      const [notes, setNotes] = React.useState('');

      const openModal = (mode, brg = null) => {
        if (mode === 'edit' && brg) {
          setEditBarang(brg);
          setName(brg.name);
          setCode(brg.code);
          setSupplierId(brg.supplierId);
          setUnit(brg.unit);
          setStock(brg.stock);
          setKategori(brg.kategori || 'Bahan Baku');
          setNotes(brg.notes || '');
          setModalOpen('edit');
        } else {
          setEditBarang(null);
          setName('');
          const newCode = 'BRG-' + String(barangList.length + 1).padStart(3, '0');
          setCode(newCode);
          setSupplierId('');
          setUnit('SAK');
          setStock(0);
          setKategori('Bahan Baku');
          setNotes('');
          setModalOpen('add');
        }
      };

      const handleSave = async (e) => {
        e.preventDefault();
        if (!supplierId) {
          alert('Harap pilih supplier!');
          return;
        }

        const data = {
          name,
          code,
          supplierId: Number(supplierId),
          unit,
          stock: Number(stock),
          kategori,
          notes
        };

        if (modalOpen === 'edit') {
          data.id = editBarang.id;
          await saveToStore('barang', data);
          await logActivity('Ubah Barang', `Barang ${name} (${code}) diupdate.`);
          showToast(`Barang ${name} berhasil disimpan.`);
        } else {
          await saveToStore('barang', data);
          await logActivity('Tambah Barang', `Barang baru ${name} (${code}) ditambahkan.`);
          showToast(`Barang ${name} berhasil ditambahkan.`);
        }

        setModalOpen(null);
        reloadData();
      };

      const handleDelete = async (brg) => {
        if (confirm(`Apakah Anda yakin ingin menghapus barang "${brg.name}"?`)) {
          await deleteFromStore('barang', brg.id);
          await logActivity('Hapus Barang', `Barang ${brg.name} (${brg.code}) dihapus.`);
          showToast(`Barang ${brg.name} telah dihapus.`, 'error');
          reloadData();
        }
      };

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Kode, Nama, Kategori, Satuan, Stok, Supplier
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rCode = row[0] ? String(row[0]).trim() : '';
              const rName = row[1] ? String(row[1]).trim() : '';
              const rKategori = row[2] ? String(row[2]).trim() : 'Bahan Baku';
              const rUnit = row[3] ? String(row[3]).trim().toUpperCase() : 'SAK';
              const rStock = row[4] ? Number(row[4]) : 0;
              const rSupplierName = row[5] ? String(row[5]).trim() : '';

              if (!rCode || !rName) continue;

              let supId = suppliers[0] ? suppliers[0].id : 1;
              if (rSupplierName) {
                const matchedSup = suppliers.find(s => s.name.toLowerCase() === rSupplierName.toLowerCase());
                if (matchedSup) supId = matchedSup.id;
              }

              const newBarang = {
                code: rCode,
                name: rName,
                kategori: rKategori,
                unit: rUnit,
                stock: rStock,
                supplierId: supId,
                notes: 'Diimpor via Excel'
              };

              const existing = barangList.find(b => b.code.toLowerCase() === rCode.toLowerCase());
              if (existing) {
                newBarang.id = existing.id;
                newBarang.supplierId = existing.supplierId; // keep original supplier reference
              }

              await saveToStore('barang', newBarang);
              importedCount++;
            }

            await logActivity('Import Barang', `${importedCount} barang diimpor dari file Excel.`);
            showToast(`${importedCount} barang berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Kode Barang', 'Nama Barang', 'Kategori', 'Satuan', 'Stok Saat Ini', 'Supplier']
        ];
        barangList.forEach(b => {
          const sup = suppliers.find(s => s.id === b.supplierId);
          rows.push([
            b.code,
            b.name,
            b.kategori || 'Bahan Baku',
            b.unit,
            b.stock,
            sup ? sup.name : '-'
          ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{ wch: 15 }, { wch: 30 }, { wch: 20 }, { wch: 10 }, { wch: 15 }, { wch: 25 }];
        XLSX.utils.book_append_sheet(wb, ws, 'Data Barang');
        XLSX.writeFile(wb, `Data_Barang_PT_AR_MultiKarya_${new Date().getFullYear()}.xlsx`);
        showToast('Daftar barang berhasil diekspor ke Excel.');
      };

      const filtered = barangList.filter(b => 
        b.name.toLowerCase().includes(globalSearch.toLowerCase()) ||
        b.code.toLowerCase().includes(globalSearch.toLowerCase()) ||
        (b.kategori && b.kategori.toLowerCase().includes(globalSearch.toLowerCase()))
      );

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Manajemen Bahan Baku & Barang</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Master data inventaris PT AR MULTI KARYA</span>
            </div>
            
            <div className="flex gap-2">
              {!isReadOnly && (
                <label className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-pointer flex items-center gap-1.5 border border-slate-250 dark:border-slate-700">
                  <i data-lucide="file-input" className="w-3.5 h-3.5"></i> Import Excel
                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>
              )}
              <button 
                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>
              {!isReadOnly && (
                <button 
                  onClick={() => openModal('add')}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/15 flex items-center gap-1.5"
                >
                  <i data-lucide="plus" className="w-3.5 h-3.5"></i> Tambah Barang
                </button>
              )}
            </div>
          </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm overflow-hidden">
            <table className="w-full text-left border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-855 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">Kode</th>
                  <th className="py-4 px-6">Nama Barang</th>
                  <th className="py-4 px-6">Kategori</th>
                  <th className="py-4 px-6">Supplier Terkait</th>
                  <th className="py-4 px-6">Stok Saat Ini</th>
                  <th className="py-4 px-6">Satuan</th>
                  {!isReadOnly && <th className="py-4 px-6 text-right">Aksi</th>}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {filtered.length === 0 ? (
                  <tr>
                    <td colSpan={isReadOnly ? "6" : "7"} className="py-8 text-center text-slate-400 font-medium">Tidak ada data barang ditemukan.</td>
                  </tr>
                ) : (
                  filtered.map(b => {
                    const sup = suppliers.find(s => s.id === b.supplierId);
                    return (
                      <tr key={b.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                        <td className="py-4 px-6 font-mono font-bold text-primary-600 dark:text-primary-400">{b.code}</td>
                        <td className="py-4 px-6">
                          <div className="font-extrabold text-slate-850 dark:text-white">{b.name}</div>
                          <span className="text-[9px] text-slate-400 font-semibold">{b.notes || '-'}</span>
                        </td>
                        <td className="py-4 px-6 text-slate-550 dark:text-slate-400 font-bold">{b.kategori || 'Bahan Baku'}</td>
                        <td className="py-4 px-6 font-semibold text-slate-600 dark:text-slate-350">{sup ? sup.name : 'Supplier Tidak Diketahui'}</td>
                        <td className="py-4 px-6">
                          <span className={`px-2 py-0.5 rounded text-[10px] font-extrabold ${
                            b.stock <= 50 ? 'bg-amber-50 text-amber-655' : 'bg-green-50 text-green-655'
                          }`}>
                            {b.stock}
                          </span>
                        </td>
                        <td className="py-4 px-6 text-slate-500 font-bold">{b.unit}</td>
                        {!isReadOnly && (
                          <td className="py-4 px-6 text-right">
                            <div className="inline-flex gap-2">
                              <button 
                                onClick={() => openModal('edit', b)}
                                className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-primary-600 hover:border-primary-200 dark:hover:border-primary-900"
                              >
                                <i data-lucide="edit-3" className="w-3.5 h-3.5"></i>
                              </button>
                              <button 
                                onClick={() => handleDelete(b)}
                                className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-red-655 hover:border-red-200 dark:hover:border-red-955"
                              >
                                <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                              </button>
                            </div>
                          </td>
                        )}
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>

          {/* Form Modal */}
          {modalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-lg rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-855 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">{modalOpen === 'add' ? 'Tambah Barang Baru' : 'Ubah Data Barang'}</h4>
                  <button onClick={() => setModalOpen(null)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                <form onSubmit={handleSave} className="p-6 space-y-4 text-xs font-semibold">
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Kode Barang</label>
                    <input type="text" readOnly value={code} className="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white font-mono" />
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Nama Barang *</label>
                    <input type="text" required value={name} onChange={(e) => setName(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Kategori Barang</label>
                      <input type="text" value={kategori} onChange={(e) => setKategori(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" placeholder="misal: Bahan Baku, Jasa" />
                    </div>
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Satuan Unit</label>
                      <input type="text" required value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" placeholder="misal: SAK, M3, PCS" />

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Supplier Penanggung Jawab *</label>
                      <select required value={supplierId} onChange={(e) => setSupplierId(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white">

                  <div className="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-855">

    // ==========================================
    // 6. PRICE LIST VIEW MODULE
    // ==========================================
    function PriceListModule({ priceLists, barangList, globalSearch, reloadData, logActivity, showToast, priceAlerts, currentUser }) {
      const isReadOnly = currentUser?.role !== 'admin' && currentUser?.role !== 'finance';
      const [modalOpen, setModalOpen] = React.useState(false);
      
      const [barangId, setBarangId] = React.useState('');
      const [hargaBeli, setHargaBeli] = React.useState('');
      const [hargaJual, setHargaJual] = React.useState('');
      const [effectiveDate, setEffectiveDate] = React.useState('');

      const handleSave = async (e) => {
        e.preventDefault();
        if (!barangId) {
          alert('Harap pilih barang!');
          return;
        }

        const data = {
          barangId: Number(barangId),
          hargaBeli: Number(hargaBeli),
          hargaJual: Number(hargaJual),
          effectiveDate
        };

        await saveToStore('price_lists', data);
        const b = barangList.find(x => x.id === Number(barangId));
        await logActivity('Atur Harga', `Harga untuk ${b ? b.name : 'Barang'} diatur ke Beli: ${formatRupiah(hargaBeli)}, Jual: ${formatRupiah(hargaJual)} mulai ${effectiveDate}.`);
        showToast('Harga baru berhasil disimpan.');
        
        setModalOpen(false);
        setBarangId('');
        setHargaBeli('');
        setHargaJual('');
        setEffectiveDate('');
        reloadData();
      };

      const handleDelete = async (p) => {
        if (confirm('Apakah Anda yakin ingin menghapus penetapan harga ini?')) {
          await deleteFromStore('price_lists', p.id);
          await logActivity('Hapus Harga', `Daftar harga ID ${p.id} dihapus.`);
          showToast('Penetapan harga dibatalkan.', 'error');
          reloadData();
        }
      };

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Nama Barang, Harga Beli, Harga Jual, Tanggal Berlaku
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rBarangName = row[0] ? String(row[0]).trim() : '';
              const rHargaBeli = row[1] ? Number(row[1]) : 0;
              const rHargaJual = row[2] ? Number(row[2]) : 0;
              const rDate = row[3] ? String(row[3]).trim() : new Date().toISOString().split('T')[0];

              if (!rBarangName) continue;

              const matchedBarang = barangList.find(b => b.name.toLowerCase() === rBarangName.toLowerCase());
              if (!matchedBarang) continue;

              const newPriceList = {
                barangId: matchedBarang.id,
                hargaBeli: rHargaBeli,
                hargaJual: rHargaJual,
                effectiveDate: rDate
              };

              // Check if already exists for same date and item
              const existing = priceLists.find(p => p.barangId === matchedBarang.id && p.effectiveDate === rDate);
              if (existing) {
                newPriceList.id = existing.id;
              }

              await saveToStore('price_lists', newPriceList);
              importedCount++;
            }

            await logActivity('Import Price List', `${importedCount} entri katalog harga diimpor dari file Excel.`);
            showToast(`${importedCount} katalog harga berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Nama Barang', 'Harga Beli', 'Harga Jual', 'Tanggal Berlaku']
        ];
        priceLists.forEach(p => {
          const b = barangList.find(x => x.id === p.barangId);
          rows.push([
            b ? b.name : 'Unknown',
            p.hargaBeli,
            p.hargaJual,
            p.effectiveDate
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Price Lists');
        XLSX.writeFile(wb, 'Data_Price_List_PT_AR.xlsx');
        logActivity('Export Price List', 'Data katalog harga diexport ke Excel.');
        showToast('Data harga berhasil diexport ke Excel.');
      };

      const filtered = priceLists.filter(p => {
        const b = barangList.find(x => x.id === p.barangId);
        return b && b.name.toLowerCase().includes(globalSearch.toLowerCase());
      });

      return (
        <div className="space-y-6 animate-fade-in">
          {priceAlerts && priceAlerts.length > 0 && (
            <div className="p-4 bg-amber-50 dark:bg-amber-955/20 border border-amber-200 dark:border-amber-900/40 text-amber-850 dark:text-amber-300 rounded-2xl text-xs font-semibold flex items-start gap-3 no-print">
              <i data-lucide="bell" className="w-4 h-4 text-amber-550 flex-shrink-0 mt-0.5 animate-bounce"></i>
              <div>
                <span className="font-bold">Item Perlu Update Harga (Sudah &gt; 7 Hari):</span> {priceAlerts.join(', ')}. Harap lakukan update harga jual/beli standard di bawah.
              </div>
            </div>
          )}
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Price List (Katalog Harga Jual & Beli)</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Penetapan harga beli standard untuk PO dan harga jual standard untuk Invoice</span>
            </div>
            
            <div className="flex gap-2">
              {!isReadOnly && (
                <label className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-pointer flex items-center gap-1.5 border border-slate-250 dark:border-slate-700">
                  <i data-lucide="file-input" className="w-3.5 h-3.5"></i> Import Excel
                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>
              )}
              <button 
                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>
              {!isReadOnly && (
                <button 
                  onClick={() => {
                    setEffectiveDate(new Date().toISOString().split('T')[0]);
                    setModalOpen(true);
                  }}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/15 flex items-center gap-2"
                >
                  <i data-lucide="plus" className="w-3.5 h-3.5"></i> Tetapkan Harga Baru
                </button>
              )}
            </div>
          </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm overflow-hidden">
            <table className="w-full text-left border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-855 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">Barang</th>
                  {!isReadOnly && <th className="py-4 px-6 text-right">Harga Beli Standard</th>}
                  <th className="py-4 px-6 text-right">Harga Jual Standard</th>
                  <th className="py-4 px-6 text-center">Tanggal Berlaku</th>
                  {!isReadOnly && <th className="py-4 px-6 text-right">Aksi</th>}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {filtered.length === 0 ? (
                  <tr>
                    <td colSpan={isReadOnly ? 3 : 5} className="py-8 text-center text-slate-400 font-medium">Tidak ada penetapan harga ditemukan.</td>
                  </tr>
                ) : (
                  filtered.map(p => {
                    const b = barangList.find(x => x.id === p.barangId);
                    return (
                      <tr key={p.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                        <td className="py-4 px-6 font-extrabold text-slate-855 dark:text-white">{b ? b.name : 'Unknown'}</td>
                        {!isReadOnly && <td className="py-4 px-6 text-right font-extrabold text-red-500">{formatRupiah(p.hargaBeli || 0)}</td>}
                        <td className="py-4 px-6 text-right font-extrabold text-primary-600 dark:text-primary-400">{formatRupiah(p.hargaJual || 0)}</td>
                        <td className="py-4 px-6 text-center font-semibold text-slate-550">{p.effectiveDate}</td>
                        {!isReadOnly && (
                          <td className="py-4 px-6 text-right">
                            <button 
                              onClick={() => handleDelete(p)}
                              className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-red-655 hover:border-red-200"
                            >
                              <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                            </button>
                          </td>
                        )}
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>

          {/* Form Modal */}
          {modalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-lg rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-855 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">Buat Ketentuan Harga Jual & Beli</h4>
                  <button onClick={() => setModalOpen(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                <form onSubmit={handleSave} className="p-6 space-y-4 text-xs font-semibold">
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Barang/Bahan Baku *</label>
                    <select required value={barangId} onChange={(e) => setBarangId(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white">
                      <option value="">-- Pilih Barang --</option>
                      {barangList.map(b => (
                        <option key={b.id} value={b.id}>{b.name} ({b.unit})</option>
                      ))}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Harga Beli Standard (IDR) *</label>
                      <input type="number" required min="0" value={hargaBeli} onChange={(e) => setHargaBeli(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                    </div>
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Harga Jual Standard (IDR) *</label>
                      <input type="number" required min="0" value={hargaJual} onChange={(e) => setHargaJual(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Tanggal Mulai Berlaku *</label>
                    <input type="date" required value={effectiveDate} onChange={(e) => setEffectiveDate(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white" />
                  </div>

                  <div className="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-855">
                    <button type="button" onClick={() => setModalOpen(false)} className="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-500 text-xs font-bold hover:bg-slate-50">Batal</button>
                    <button type="submit" className="px-5 py-2 rounded-xl bg-primary-600 hover:bg-primary-700 text-white text-xs font-bold shadow-lg shadow-primary-950/10">Terapkan Harga</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 7. PURCHASE ORDER (PO) VIEW MODULE
    // ==========================================
    function PurchaseOrderModule({ poList, suppliers, barangList, priceLists, customers, invoices, globalSearch, reloadData, logActivity, showToast, currentUser, onlyShowShipments }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const [modalOpen, setModalOpen] = React.useState(false);
      const [viewPO, setViewPO] = React.useState(null);
      const [viewInvoiceModal, setViewInvoiceModal] = React.useState(null);
      const [previewFileModal, setPreviewFileModal] = React.useState(null);
      
      // Receipt States
      const [receiptPO, setReceiptPO] = React.useState(null);
      const [receiptDate, setReceiptDate] = React.useState('');
      const [receiptFile, setReceiptFile] = React.useState('');
      const [receivedItems, setReceivedItems] = React.useState([]);
      
      // Fields
      const [editingId, setEditingId] = React.useState(null);
      const [poNumber, setPoNumber] = React.useState('');
      const [supplierId, setSupplierId] = React.useState('');
      const [poDate, setPoDate] = React.useState('');
      const [deliveryRequestDate, setDeliveryRequestDate] = React.useState('');
      const [status, setStatus] = React.useState('Draft');
      const [jenis, setJenis] = React.useState('Barang');
      const [deskripsi, setDeskripsi] = React.useState('');
      const [customerId, setCustomerId] = React.useState('');
      const [createdByDetail, setCreatedByDetail] = React.useState('');
      const [budgetLimit, setBudgetLimit] = React.useState('');
      const [poItems, setPoItems] = React.useState([{ barangId: '', qty: 1, price: 0, total: 0 }]);

      // Pre-select customer if currentUser has customerId (mitra or sppg linked account)
      React.useEffect(() => {
        if (currentUser?.customerId) {
          setCustomerId(String(currentUser.customerId));
        } else if (currentUser?.role === 'mitra' && customers.length > 0 && !customerId) {
          const matchedCust = customers.find(c => 
            c.name.toLowerCase() === currentUser.username.toLowerCase() || 
            c.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
            c.company.toLowerCase().includes(currentUser.username.toLowerCase())
          );
          if (matchedCust) {
            setCustomerId(String(matchedCust.id));
          }
        }
      }, [currentUser, customers, customerId]);

      // Filter States
      const [filterCreator, setFilterCreator] = React.useState('');
      const [filterStartDate, setFilterStartDate] = React.useState('');
      const [filterEndDate, setFilterEndDate] = React.useState('');

      React.useEffect(() => {
        if ((viewPO || receiptPO || modalOpen) && window.lucide) {
          setTimeout(() => {
            window.lucide.createIcons();
          }, 50);
        }
      }, [viewPO, receiptPO, modalOpen, poItems.length]);

      const openModal = () => {
        const num = 'PO-' + new Date().getFullYear() + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(poList.length + 1).padStart(4, '0');
        setEditingId(null);
        setPoNumber(num);
        setSupplierId('');
        setPoDate(new Date().toISOString().split('T')[0]);
        setDeliveryRequestDate(new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]);
        setStatus('Draft');
        setJenis('Barang');
        setDeskripsi('');
        setCustomerId(currentUser?.customerId ? String(currentUser.customerId) : '');
        setBudgetLimit('');
        let defaultDetail = '';
        if (currentUser?.role === 'sppg') {
          const match = customers.find(c => c.id === currentUser.customerId);
          defaultDetail = match ? match.name : 'SPPG ' + currentUser.username;
        }
        setCreatedByDetail(defaultDetail);
        setPoItems([{ barangId: '', qty: 1, price: 0, total: 0 }]);
        setModalOpen(true);
      };

      const openEditModal = (po) => {
        setEditingId(po.id);
        setPoNumber(po.poNumber);
        setSupplierId(String(po.supplierId || ''));
        setPoDate(po.poDate);
        setDeliveryRequestDate(po.deliveryRequestDate || '');
        setStatus(po.status || 'Draft');
        setJenis(po.jenis || 'Barang');
        setDeskripsi(po.deskripsi || '');
        setCustomerId(String(po.customerId || ''));
        setBudgetLimit(po.budgetLimit ? String(po.budgetLimit) : '');
        setCreatedByDetail(po.createdByDetail || '');
        setPoItems(po.items.map(it => ({
          barangId: String(it.barangId),
          qty: it.qty,
          price: it.price,
          total: it.total
        })));
        setModalOpen(true);
      };

      const setPOThisWeekFilter = () => {
        const today = new Date();
        const currentDay = today.getDay(); // 0: Sun, 1: Mon, ...
        const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
        const monday = new Date(today);
        monday.setDate(today.getDate() + distanceToMonday);
        
        const saturday = new Date(monday);
        saturday.setDate(monday.getDate() + 5); // Monday + 5 = Saturday
        
        setFilterStartDate(monday.toISOString().split('T')[0]);
        setFilterEndDate(saturday.toISOString().split('T')[0]);
      };

      const handleAddItem = () => {
        setPoItems([...poItems, { barangId: '', qty: 1, price: 0, total: 0 }]);
      };

      const handleRemoveItem = (index) => {
        if (poItems.length === 1) return;
        setPoItems(poItems.filter((_, idx) => idx !== index));
      };

      const handleItemChange = (index, field, value) => {
        const updated = [...poItems];
        updated[index][field] = value;

        // Auto price pull from price_lists if barangId changes (pulling hargaJual because customer is buying from AR Multi Karya)
        if (field === 'barangId') {
          const matches = priceLists.filter(p => p.barangId === Number(value));
          if (matches.length > 0) {
            matches.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
            updated[index].price = matches[0].hargaJual || 0;
          } else {
            updated[index].price = 0;
          }
        }

        const qty = Number(updated[index].qty) || 0;
        const price = Number(updated[index].price) || 0;
        updated[index].total = qty * price;

        setPoItems(updated);
      };

      const currentTotal = poItems.reduce((sum, it) => sum + (Number(it.qty) * Number(it.price) || 0), 0);
      const isOverBudget = budgetLimit && Number(budgetLimit) > 0 && currentTotal > Number(budgetLimit);

      const handleSave = async (e) => {
        e.preventDefault();
        if (!customerId || poItems.some(item => !item.barangId)) {
          alert('Harap lengkapi isian customer & barang!');
          return;
        }

        if (budgetLimit && Number(budgetLimit) > 0 && currentTotal > Number(budgetLimit)) {
          alert('Anda membeli barang melebihi budget!');
          return;
        }

        const data = {
          poNumber,
          supplierId: 0, // PT AR MULTI KARYA (Fixed)
          poDate,
          deliveryRequestDate,
          status,
          jenis,
          deskripsi,
          createdByDetail,
          createdBy: currentUser.username,
          customerId: Number(customerId),
          budgetLimit: budgetLimit ? Number(budgetLimit) : 0,
          items: poItems.map(it => ({
            barangId: Number(it.barangId),
            qty: Number(it.qty),
            price: Number(it.price),
            total: Number(it.qty) * Number(it.price)
          })),
          totalAmount: currentTotal
        };

        if (editingId) {
          data.id = editingId;
          const existingPO = poList.find(p => p.id === editingId);
          if (existingPO) {
            if (existingPO.receipts) data.receipts = existingPO.receipts;
            if (existingPO.fileInvoiceLunas) data.fileInvoiceLunas = existingPO.fileInvoiceLunas;
            if (existingPO.createdBy) data.createdBy = existingPO.createdBy;
          }
          await saveToStore('po', data);
          await logActivity('Ubah PO', `Purchase Order ${poNumber} (${jenis}) diperbarui oleh ${createdByDetail || currentUser.username}.`);
          showToast(`PO ${poNumber} berhasil diperbarui.`);
        } else {
          await saveToStore('po', data);
          await logActivity('Tambah PO', `Purchase Order ${poNumber} (${jenis}) dibuat oleh ${createdByDetail || currentUser.username} dengan status ${status}.`);
          showToast(`PO ${poNumber} berhasil disimpan.`);
        }
        
        setModalOpen(false);
        reloadData();
      };

      const handleUploadSuratJalanPO = (e, recordId) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (evt) => {
          const record = poList.find(p => p.id === recordId);
          if (record) {
            const dataToSave = { ...record, fileSuratJalan: evt.target.result, status: 'Selesai' };
            await saveToStore('po', dataToSave);
            showToast(`Surat Jalan untuk PO ${record.poNumber} berhasil diunggah.`);
            reloadData();
            setTimeout(() => {
              if (window.lucide) window.lucide.createIcons();
            }, 100);
          }
        };
        reader.readAsDataURL(file);
      };

      const handleUploadInvoicePO = (e, recordId) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (evt) => {
          const record = poList.find(p => p.id === recordId);
          if (record) {
            const dataToSave = { ...record, fileInvoiceLunas: evt.target.result, status: 'Lunas' };
            await saveToStore('po', dataToSave);
            showToast(`Invoice pelunasan untuk PO ${record.poNumber} berhasil dikirim.`);
            reloadData();
            setTimeout(() => {
              if (window.lucide) window.lucide.createIcons();
            }, 100);
          }
        };
        reader.readAsDataURL(file);
      };

      const handleKirimBarangPO = async (recordId) => {
        const record = poList.find(p => p.id === recordId);
        if (record) {
          const dataToSave = { ...record, status: 'Dikirim' };
          await saveToStore('po', dataToSave);
          showToast(`Status PO ${record.poNumber} diubah menjadi Dikirim.`);
          reloadData();
          setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
          }, 100);
        }
      };

      const handleOpenReceipt = (po) => {
        const initial = po.items.map(it => {
          const prevQty = (po.receipts || []).reduce((sum, r) => {
            const match = r.items.find(x => x.barangId === it.barangId);
            return sum + (match ? Number(match.qtyReceived) : 0);
          }, 0);
          return {
            barangId: it.barangId,
            qtyOrdered: it.qty,
            qtyPrev: prevQty,
            qtyNow: Math.max(0, it.qty - prevQty)
          };
        });
        setReceiptPO(po);
        setReceiptDate(new Date().toISOString().split('T')[0]);
        setReceiptFile('');
        setReceivedItems(initial);
      };

      const handleReceiptQtyChange = (idx, val) => {
        const updated = [...receivedItems];
        const item = updated[idx];
        const remaining = item.qtyOrdered - item.qtyPrev;
        let num = Number(val) || 0;
        if (num < 0) num = 0;
        if (num > remaining) num = remaining;
        item.qtyNow = num;
        setReceivedItems(updated);
      };

      const handleReceiptFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          setReceiptFile(evt.target.result);
        };
        reader.readAsDataURL(file);
      };

      const handleSaveReceipt = async (e) => {
        e.preventDefault();
        if (!receiptFile) {
          alert('Harap unggah berkas Surat Jalan Bukti Penerimaan!');
          return;
        }
        if (receivedItems.every(it => it.qtyNow === 0)) {
          alert('Harap masukkan kuantitas barang diterima (minimal 1 barang dengan qty > 0)!');
          return;
        }

        const newReceiptLog = {
          id: Date.now(),
          date: receiptDate,
          fileBukti: receiptFile,
          items: receivedItems.map(it => ({
            barangId: it.barangId,
            qtyReceived: Number(it.qtyNow)
          }))
        };

        const updatedReceipts = [...(receiptPO.receipts || []), newReceiptLog];

        // Recalculate PO status
        let fullyReceived = true;
        receiptPO.items.forEach(it => {
          const totalRec = updatedReceipts.reduce((sum, r) => {
            const match = r.items.find(x => x.barangId === it.barangId);
            return sum + (match ? Number(match.qtyReceived) : 0);
          }, 0);
          if (totalRec < it.qty) {
            fullyReceived = false;
          }
        });

        const newStatus = fullyReceived ? 'Selesai' : 'Diterima Parsial';
        const dataToSave = {
          ...receiptPO,
          receipts: updatedReceipts,
          status: newStatus
        };

        try {
          await saveToStore('po', dataToSave);
          showToast(`Bukti penerimaan barang PO ${receiptPO.poNumber} berhasil disimpan. Status: ${newStatus}`);
          setReceiptPO(null);
          reloadData();
          setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
          }, 100);
        } catch (err) {
          console.error(err);
          showToast('Gagal menyimpan penerimaan.', 'error');
        }
      };

      const handleDelete = async (po) => {
        if ((currentUser?.role === 'sppg' || currentUser?.role === 'mitra') && (po.status === 'Selesai' || po.status === 'Lunas')) {
          alert('PO dengan status Selesai atau Lunas tidak dapat dihapus oleh akun SPPG / Mitra!');
          return;
        }
        if (confirm(`Apakah Anda yakin menghapus PO ${po.poNumber}?`)) {
          await deleteFromStore('po', po.id);
          await logActivity('Hapus PO', `Purchase Order ${po.poNumber} dihapus.`);
          showToast(`PO ${po.poNumber} berhasil dihapus.`, 'error');
          reloadData();
        }
      };

      const getDeliveryWarning = (reqDateStr, status) => {
        if (!reqDateStr || status === 'Selesai' || status === 'Dibatalkan') return null;
        
        const today = new Date();
        today.setHours(0,0,0,0);
        const reqDate = new Date(reqDateStr);
        reqDate.setHours(0,0,0,0);
        
        const diffTime = reqDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) {
          return (
            <span className="block mt-1 px-2 py-0.5 rounded text-[9px] font-extrabold bg-red-100 text-red-700 dark:bg-red-950/30 dark:text-red-400 animate-pulse flex items-center gap-1 w-max">
              <i data-lucide="alert-octagon" className="w-3 h-3"></i> Overdue {Math.abs(diffDays)} Hari!
            </span>
          );
        } else if (diffDays <= 2) {
          return (
            <span className="block mt-1 px-2 py-0.5 rounded text-[9px] font-extrabold bg-amber-100 text-amber-700 dark:bg-amber-955/20 dark:text-amber-450 animate-pulse flex items-center gap-1 w-max">
              <i data-lucide="alert-triangle" className="w-3 h-3"></i> Kirim H-{diffDays}!
            </span>
          );
        }
      };

      const handlePrintPO = (po) => {
        const cust = customers.find(c => c.id === po.customerId);
        const printWindow = window.open('', '_blank', 'width=800,height=600');
        
        let itemsHtml = '';
        po.items.forEach((item, idx) => {
          const b = barangList.find(x => x.id === item.barangId);
          const totalItem = item.total || (item.qty * (item.price || 0));
          itemsHtml += '<tr>' +

          itemsHtml,
          '    </tbody>',

          '  <div class="total-section">',
          '    <div class="total-box">',
          '      <span>TOTAL NILAI PO:</span>',

          '    </div>',

          deskripsiHtml,
          '  <div style="margin-top: 60px; display: grid; grid-template-cols: 1fr 1fr; gap: 40px; text-align: center;">',
          '    <div>',
          '      <div style="font-size: 11px; color: #6b7280; margin-bottom: 50px; text-transform: uppercase; font-weight: bold;">Pembuat / SPPG</div>',

          '    </div>',
          '    <div>',
          '      <div style="font-size: 11px; color: #6b7280; margin-bottom: 50px; text-transform: uppercase; font-weight: bold;">Nama Pemesan</div>',

        printWindow.document.write(htmlLines.join('\n'));
        printWindow.document.close();
      };

      const filtered = poList.filter(po => {
        // Filter based on linked customerId for SPPG or Mitra
        if (currentUser?.customerId) {
          if (po.customerId !== currentUser.customerId) return false;
        } else {
          // Fallback legacy filters
          if (currentUser?.role === 'sppg') {
            const isCreatedByMe = po.createdBy === currentUser.username ||
                                (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                                (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
            if (!isCreatedByMe) return false;
          }
          if (currentUser?.role === 'mitra') {
            const matchedCust = customers.find(c => 
              c.name.toLowerCase() === currentUser.username.toLowerCase() || 
              c.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
              c.company.toLowerCase().includes(currentUser.username.toLowerCase())
            );
            if (!matchedCust || po.customerId !== matchedCust.id) return false;
          }
        }

        if (onlyShowShipments) {
          const isShippedOrReceived = po.status === 'Dikirim' || po.status === 'Diterima Parsial' || po.status === 'Selesai' || po.status === 'Lunas';
          if (!isShippedOrReceived) return false;
        }

        const cust = customers.find(c => c.id === po.customerId);
        const matchesSearch = po.poNumber.toLowerCase().includes(globalSearch.toLowerCase()) ||
               (cust && cust.name.toLowerCase().includes(globalSearch.toLowerCase()));
        
        const matchesCreator = !filterCreator || (po.createdByDetail && po.createdByDetail.toLowerCase().includes(filterCreator.toLowerCase()));
        const matchesDate = (!filterStartDate || po.poDate >= filterStartDate) &&
                            (!filterEndDate || po.poDate <= filterEndDate);
                            
        return matchesSearch && matchesCreator && matchesDate;
      });

      // Summary Stats
      const totalPOCount = filtered.length;
      const totalPOAmount = filtered.reduce((sum, po) => sum + (po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0)), 0);

      // Item summary ordered
      const itemSummary = {};
      filtered.forEach(po => {
        po.items.forEach(it => {
          const b = barangList.find(x => x.id === it.barangId);
          if (b) {
            const name = b.name;
            const unit = b.unit || 'Unit';
            if (!itemSummary[name]) {
              itemSummary[name] = { qty: 0, unit };
            }
            itemSummary[name].qty += it.qty;
          }
        });
      });

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Nomor PO, Tipe/Jenis, Nama Pemesan, Tanggal PO, Permintaan Kirim, Pembuat / SPPG, Status, Total Uang, Deskripsi
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rNumber = row[0] ? String(row[0]).trim() : '';
              const rJenis = row[1] ? String(row[1]).trim() : 'Barang';
              const rCustomerName = row[2] ? String(row[2]).trim() : '';
              const rDate = row[3] ? String(row[3]).trim() : new Date().toISOString().split('T')[0];
              const rDeliveryDate = row[4] ? String(row[4]).trim() : new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
              const rCreator = row[5] ? String(row[5]).trim() : '';
              const rStatus = row[6] ? String(row[6]).trim() : 'Draft';
              const rTotal = row[7] ? Number(row[7]) : 0;
              const rDesc = row[8] ? String(row[8]).trim() : '';

              if (!rNumber) continue;

              let custId = customers[0] ? customers[0].id : 1;
              if (rCustomerName) {
                const matchedCust = customers.find(c => c.name.toLowerCase() === rCustomerName.toLowerCase());
                if (matchedCust) custId = matchedCust.id;
              }

              // Create default item matching first item in price list or first item in barang
              let bId = barangList[0] ? barangList[0].id : 1;
              const newPO = {
                poNumber: rNumber,
                jenis: rJenis,
                supplierId: 0,
                customerId: custId,
                poDate: rDate,
                deliveryRequestDate: rDeliveryDate,
                createdByDetail: rCreator,
                status: rStatus,
                totalAmount: rTotal,
                deskripsi: rDesc,
                items: [{ barangId: bId, qty: 1, price: rTotal, total: rTotal }]
              };

              const existing = poList.find(p => p.poNumber.toLowerCase() === rNumber.toLowerCase());
              if (existing) {
                newPO.id = existing.id;
              }

              await saveToStore('po', newPO);
              importedCount++;
            }

            await logActivity('Import PO', `${importedCount} PO diimpor dari file Excel.`);
            showToast(`${importedCount} PO berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Nomor PO', 'Tipe/Jenis', 'Nama Pemesan', 'Tanggal PO', 'Permintaan Kirim', 'Pembuat / SPPG', 'Status', 'Total Uang', 'Deskripsi']
        ];
        poList.forEach(po => {
          const cust = customers.find(c => c.id === po.customerId);
          const total = po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0);
          rows.push([
            po.poNumber,
            po.jenis || 'Barang',
            cust ? cust.name : '-',
            po.poDate,
            po.deliveryRequestDate || '',
            po.createdByDetail || '',
            po.status,
            total,
            po.deskripsi || ''
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Purchase Orders');
        XLSX.writeFile(wb, 'Data_PO_PT_AR.xlsx');
        logActivity('Export PO', 'Data PO diexport ke Excel.');
        showToast('Data PO berhasil diexport ke Excel.');

                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>

                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>

                <button 
                  onClick={openModal}

                >
                  <i data-lucide="plus" className="w-3.5 h-3.5"></i> Buat PO Baru
                </button>

                value={filterCreator} 
                onChange={(e) => setFilterCreator(e.target.value)} 
                placeholder="Cari SPPG/Pembuat..." 
                className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white w-48 text-xs font-semibold" 
              />

            <div>

              <input 
                type="date" 
                value={filterStartDate} 
                onChange={(e) => setFilterStartDate(e.target.value)} 
                className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white text-xs font-semibold" 
              />
            </div>
            <div>

              <input 
                type="date" 
                value={filterEndDate}

              />

              <div>
                <span className="text-[10px] uppercase text-slate-400 font-bold tracking-wider block">Total Transaksi PO</span>
                <div className="text-2xl font-extrabold text-slate-850 dark:text-white mt-1">{totalPOCount} PO</div>
              </div>

            </div>

            <div className="bg-white dark:bg-slate-955 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm flex flex-col justify-between">
              <div>
                <span className="text-[10px] uppercase text-slate-400 font-bold tracking-wider block">PO Apa Saja (Rincian Barang)</span>

                    <span className="text-slate-400 font-medium italic block mt-1">Belum ada barang diorder</span>
                  ) : (
                    Object.keys(itemSummary).map(name => (
                      <div key={name} className="flex justify-between border-b border-slate-100 dark:border-slate-900/50 pb-0.5">
                        <span>{name}</span>
                        <span className="text-primary-600 font-extrabold">{itemSummary[name].qty} {itemSummary[name].unit}</span>
                      </div>
                    ))
                  )}
                </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-855 shadow-sm overflow-hidden">

                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-850 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">Nomor PO</th>
                  <th className="py-4 px-6">Jenis / Tipe</th>
                  <th className="py-4 px-6">Nama Pemesan</th>
                  <th className="py-4 px-6">Tanggal PO</th>
                  <th className="py-4 px-6">Permintaan Kirim</th>
                  <th className="py-4 px-6">Status</th>
                  <th className="py-4 px-6">Total PO</th>
                  <th className="py-4 px-6">Surat Jalan (SPPG)</th>
                  <th className="py-4 px-6">Invoice (Finance)</th>
                  <th className="py-4 px-6 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {filtered.length === 0 ? (
                  <tr>
                    <td colSpan="10" className="py-8 text-center text-slate-400 font-medium">Tidak ada data PO ditemukan.</td>
                  </tr>
                ) : (
                  filtered.map(po => {
                    const cust = customers.find(c => c.id === po.customerId);
                    const grandTotal = po.totalAmount || po.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0);
                    return (
                      <tr key={po.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                        <td className="py-4 px-6 font-mono font-bold text-primary-600 dark:text-primary-400">{po.poNumber}</td>
                        <td className="py-4 px-6">
                          <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                            po.jenis === 'Jasa' ? 'bg-indigo-50 text-indigo-650' : 'bg-teal-50 text-teal-650'
                          }`}>
                            {po.jenis || 'Barang'}
                          </span>
                        </td>
                        <td className="py-4 px-6 font-extrabold text-slate-855 dark:text-white">{cust ? cust.name : '-'}</td>
                        <td className="py-4 px-6 font-semibold text-slate-550">{po.poDate}</td>
                        <td className="py-4 px-6 font-semibold">
                          <span className="text-slate-700 dark:text-slate-300 font-bold">{po.deliveryRequestDate || '-'}</span>
                          {getDeliveryWarning(po.deliveryRequestDate, po.status)}

                  {(currentUser?.role === 'sppg' || currentUser?.role === 'mitra' || currentUser?.role === 'admin') && (viewPO.status === 'Belum diproses' || viewPO.status === 'Belum di proses' || viewPO.status === 'Pending' || viewPO.status === 'Draft') && (

                    >
                      <i data-lucide="edit-3" className="w-3.5 h-3.5"></i> Ubah PO
                    </button>

                  {(currentUser?.role === 'sppg' || currentUser?.role === 'admin' || currentUser?.role === 'mitra') && (viewPO.status === 'Dikirim' || viewPO.status === 'Diterima Parsial') && (
                    <button 
                      onClick={() => {

                    </button>

                  <button 
                    onClick={() => handlePrintPO(viewPO)}

                  >

                  <button onClick={() => setViewPO(null)} className="bg-slate-200 hover:bg-slate-255 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-bold px-4 py-2.5 rounded-xl">
