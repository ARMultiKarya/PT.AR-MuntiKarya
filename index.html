    // ==========================================
    // 12.1 KOMUNIKASI (PESAN INTERNAL) MODULE
    // ==========================================
    function KomunikasiModule({ chatMessages, reloadData, showToast, currentUser }) {
      const [activeRoom, setActiveRoom] = React.useState('koordinasi-umum'); // default room
      const [messageText, setMessageText] = React.useState('');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [userPhotos, setUserPhotos] = React.useState({});
      
      const chatEndRef = React.useRef(null);

      React.useEffect(() => {
        const loadPhotos = async () => {
          try {
            const list = await getAllFromStore('users');
            const map = {};
            list.forEach(u => {
              map[u.username] = u.profilePic || '';
            });
            setUserPhotos(map);
          } catch (err) {
            console.error(err);
          }
        };
        loadPhotos();
      }, [chatMessages]);

      const rooms = [
        { id: 'koordinasi-umum', name: '# koordinasi-umum', type: 'channel', desc: 'Saluran koordinasi umum seluruh divisi PT AR MULTI KARYA.' },
        { id: 'divisi-po-logistik', name: '# divisi-po-logistik', type: 'channel', desc: 'Koordinasi pemesanan barang dan logistik bahan baku.' },
        { id: 'admin', name: 'Admin Utama', type: 'direct', desc: 'Hubungi langsung Admin untuk otorisasi dan akun.' },
        { id: 'finance', name: 'Keuangan / Finance', type: 'direct', desc: 'Hubungi langsung Bagian Keuangan / Pembayaran.' },
        { id: 'sppg', name: 'SPPG Lapangan', type: 'direct', desc: 'Hubungi langsung Penanggung Jawab PO & Logistik Lapangan.' },
        { id: 'mitra', name: 'Mitra Usaha', type: 'direct', desc: 'Hubungi langsung perwakilan Mitra Usaha.' }
      ];

      // Filter rooms based on search term
      const filteredRooms = rooms.filter(r => 
        r.id !== currentUser.username && // Don't show self in direct messages
        r.name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      // Filter messages for active room
      const activeMessages = chatMessages.filter(m => {
        if (m.channelId === activeRoom) return true;
        // Direct messages match
        if (m.channelId === 'direct') {
          return (m.sender === currentUser.username && m.receiver === activeRoom) ||
                 (m.sender === activeRoom && m.receiver === currentUser.username);
        }
        return false;
      });

      // Scroll to bottom helper
      const scrollToBottom = () => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      };

      React.useEffect(() => {
        scrollToBottom();
        // Initial lucide icons load inside chat bubbles if any
        if (window.lucide) window.lucide.createIcons();
      }, [activeRoom, chatMessages]);

      // Mark messages in active room as read
      React.useEffect(() => {
        const markAsRead = async () => {
          const promises = [];
          let updated = false;
          for (const m of chatMessages) {
            const isSender = m.sender === currentUser.username;
            if (isSender) continue;

            const isCurrentChannel = m.channelId === activeRoom;
            const isCurrentDirect = m.channelId === 'direct' && 
                                    ((m.sender === activeRoom && m.receiver === currentUser.username) ||
                                     (m.sender === currentUser.username && m.receiver === activeRoom));

            if (isCurrentChannel || isCurrentDirect) {
              const read = m.readBy || [];
              if (!read.includes(currentUser.username)) {
                const cloned = { ...m, readBy: [...read, currentUser.username] };
                promises.push(saveToStore('chat_messages', cloned));
                updated = true;
              }
            }
          }
          if (updated) {
            await Promise.all(promises);
            reloadData();
          }
        };
        markAsRead();
      }, [activeRoom, chatMessages]);

      const handleSendMessage = async (e) => {
        if (e) e.preventDefault();
        if (!messageText.trim()) return;

        const isDirect = rooms.find(r => r.id === activeRoom)?.type === 'direct';
        
        const newMessage = {
          sender: currentUser.username,
          role: currentUser.role,
          content: messageText.trim(),
          channelId: isDirect ? 'direct' : activeRoom,
          receiver: isDirect ? activeRoom : null,
          timestamp: new Date().toISOString(),
          readBy: [currentUser.username]
        };

        try {
          await saveToStore('chat_messages', newMessage);
          setMessageText('');
          reloadData();
          setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
          }, 100);
        } catch (err) {
          showToast('Gagal mengirim pesan', 'error');
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSendMessage();
        }
      };

      const handleMarkAllRead = async () => {
        const promises = [];
        let updated = false;
        for (const m of chatMessages) {
          if (m.sender === currentUser.username) continue;
          const read = m.readBy || [];
          if (!read.includes(currentUser.username)) {
            const cloned = { ...m, readBy: [...read, currentUser.username] };
            promises.push(saveToStore('chat_messages', cloned));
            updated = true;
          }
        }
        if (updated) {
          await Promise.all(promises);
          showToast('Semua pesan berhasil ditandai telah dibaca.');
          reloadData();
          setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
          }, 100);
        } else {
          showToast('Semua pesan memang sudah dibaca.');
        }
      };

      const getRoleBadgeColor = (role) => {
        switch (role) {
          case 'admin': return 'bg-purple-50 text-purple-700 border border-purple-200';
          case 'finance': return 'bg-blue-50 text-blue-700 border border-blue-200';
          case 'sppg': return 'bg-amber-50 text-amber-700 border border-amber-200';
          case 'mitra': return 'bg-green-50 text-green-700 border border-green-200';
          default: return 'bg-slate-50 text-slate-700 border border-slate-200';
        }
      };

      const formatChatTime = (isoString) => {
        try {
          const date = new Date(isoString);
          return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        } catch (e) {
          return '';
        }
      };

      const getUnreadCountForRoom = (room) => {
        return chatMessages.filter(m => {
          if (m.sender === currentUser.username) return false;
          const readList = m.readBy || [];
          if (readList.includes(currentUser.username)) return false;
          
          if (room.type === 'channel') {
            return m.channelId === room.id;
          } else {
            return m.channelId === 'direct' && m.sender === room.id && m.receiver === currentUser.username;
          }
        }).length;
      };

      const selectedRoomObj = rooms.find(r => r.id === activeRoom);

      return (
        <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-855 shadow-sm flex overflow-hidden min-h-[600px] max-h-[750px] animate-fade-in text-xs no-print">
          
          {/* Chat Sidebar (Rooms List) */}
          <div className="w-80 border-r border-slate-100 dark:border-slate-850 flex flex-col bg-slate-50/50 dark:bg-slate-900/10">
            {/* Search room bar */}
            <div className="p-4 border-b border-slate-150/80 dark:border-slate-850">
              <div className="relative">
                <i data-lucide="search" className="w-3.5 h-3.5 absolute left-3 top-3 text-slate-400"></i>
                <input 
                  type="text" 
                  value={searchTerm} 
                  onChange={(e) => setSearchTerm(e.target.value)} 
                  placeholder="Cari saluran atau orang..." 
                  className="w-full pl-9 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white font-semibold" 
                />
              </div>
            </div>

            {/* List */}
            <div className="flex-1 overflow-y-auto p-2 space-y-1.5">
              <div className="px-3 py-1.5 text-[9px] uppercase tracking-wider text-slate-400 font-extrabold">Saluran Grup (Channels)</div>
              {filteredRooms.filter(r => r.type === 'channel').map(room => {
                const unread = getUnreadCountForRoom(room);
                return (
                  <button
                    key={room.id}
                    onClick={() => setActiveRoom(room.id)}
                    className={`w-full flex items-center justify-between px-3 py-3 rounded-xl transition-all text-left font-bold ${
                      activeRoom === room.id 
                        ? 'bg-primary-50 dark:bg-primary-955/20 text-primary-700 dark:text-primary-400 border-l-4 border-primary-600' 
                        : 'text-slate-650 hover:bg-slate-100/60 dark:text-slate-400 dark:hover:bg-slate-900/30'
                    }`}
                  >
                    <div className="flex items-center gap-3 truncate">
                      <i data-lucide="hash" className="w-4 h-4 text-slate-400"></i>
                      <span className="truncate">{room.name}</span>
                    </div>
                    {unread > 0 && (
                      <span className="bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full leading-none scale-90 animate-pulse">
                        {unread}
                      </span>
                    )}
                  </button>
                );
              })}

              <div className="px-3 py-1.5 pt-4 text-[9px] uppercase tracking-wider text-slate-400 font-extrabold">Pesan Langsung (Direct Messages)</div>
              {filteredRooms.filter(r => r.type === 'direct').map(room => {
                const unread = getUnreadCountForRoom(room);
                return (
                  <button
                    key={room.id}
                    onClick={() => setActiveRoom(room.id)}
                    className={`w-full flex items-center justify-between px-3 py-3 rounded-xl transition-all text-left font-bold ${
                      activeRoom === room.id 
                        ? 'bg-primary-50 dark:bg-primary-955/20 text-primary-700 dark:text-primary-400 border-l-4 border-primary-600' 
                        : 'text-slate-650 hover:bg-slate-100/60 dark:text-slate-400 dark:hover:bg-slate-900/30'
                    }`}
                  >
                    <div className="flex items-center gap-3 truncate">
                      <i data-lucide="user" className="w-4 h-4 text-slate-400"></i>
                      <span className="truncate">{room.name}</span>
                    </div>
                    {unread > 0 && (
                      <span className="bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full leading-none scale-90 animate-pulse">
                        {unread}
                      </span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Current user badge */}
            <div className="p-4 border-t border-slate-150/80 dark:border-slate-850 bg-slate-50 dark:bg-slate-900/40 flex items-center gap-3">
              <div className="w-8 h-8 rounded-full bg-primary-600/10 text-primary-600 dark:text-primary-450 flex items-center justify-center font-black uppercase text-sm">
                {currentUser.username[0]}
              </div>
              <div className="truncate">
                <div className="font-extrabold text-slate-850 dark:text-white leading-tight capitalize">{currentUser.username}</div>
                <span className="text-[9px] uppercase tracking-wider text-slate-400 font-bold block mt-0.5">{currentUser.role}</span>
              </div>
            </div>
          </div>

          {/* Chat Pane */}
          <div className="flex-1 flex flex-col bg-slate-50/20 dark:bg-slate-955/10">
            {/* Header info */}
            <div className="px-6 py-4 border-b border-slate-150/80 dark:border-slate-855 bg-white dark:bg-slate-955 flex items-center justify-between">
              <div>
                <h4 className="font-black text-slate-855 dark:text-white flex items-center gap-1.5">
                  {selectedRoomObj?.type === 'channel' ? (
                    <i data-lucide="hash" className="w-4 h-4 text-slate-400"></i>

                    <i data-lucide="user" className="w-4 h-4 text-slate-400"></i>

                <p className="text-[10px] text-slate-400 mt-0.5 font-semibold">{selectedRoomObj?.desc}</p>

              <button 
                onClick={handleMarkAllRead}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-805 dark:hover:bg-slate-705 text-slate-700 dark:text-slate-200 text-[10px] font-bold px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700 flex items-center gap-1.5 transition-all"
                title="Tandai semua pesan di aplikasi telah dibaca"
              >
                <i data-lucide="check-check" className="w-3.5 h-3.5 text-primary-600 dark:text-primary-400"></i> Tandai Semua Dibaca
              </button>
            </div>

            {/* Conversation list */}
            <div className="flex-1 overflow-y-auto p-6 space-y-4">
              {activeMessages.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-center p-8 space-y-3">
                  <div className="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-900 flex items-center justify-center text-slate-400">
                    <i data-lucide="message-square" className="w-6 h-6"></i>
                  </div>
                  <div>
                    <h5 className="font-bold text-slate-700 dark:text-slate-300">Belum ada percakapan</h5>
                    <p className="text-[10px] text-slate-400 mt-1">Ketik dan kirim pesan pertama untuk memulai komunikasi.</p>
                  </div>
                </div>
              ) : (
                activeMessages.map((msg) => {
                  const isSelf = msg.sender === currentUser.username;
                  return (
                    <div key={msg.id} className={`flex items-start gap-3.5 ${isSelf ? 'justify-end' : 'justify-start'}`}>
                      {/* Avatar */}
                      {!isSelf && (
                        userPhotos[msg.sender] ? (
                          <img src={userPhotos[msg.sender]} className="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-slate-250/20" />
                        ) : (
                          <div className="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-750 dark:text-slate-300 flex items-center justify-center font-black uppercase flex-shrink-0 text-xs">
                            {msg.sender[0]}
                          </div>
                        )
                      )}
                      
                      {/* Bubble */}
                      <div className={`max-w-[70%] space-y-1 ${isSelf ? 'text-right' : 'text-left'}`}>
                        {!isSelf && (
                          <div className="flex items-center gap-2">
                            <span className="font-extrabold text-slate-700 dark:text-slate-350 capitalize">{msg.sender}</span>

                              {msg.role}
                            </span>
                          </div>
                        )}
                        <div className={`p-3 rounded-2xl text-xs font-semibold leading-relaxed shadow-sm ${
                          isSelf 
                            ? 'bg-primary-600 text-white rounded-tr-none' 
                            : 'bg-white dark:bg-slate-900 border border-slate-150 dark:border-slate-850 text-slate-800 dark:text-slate-200 rounded-tl-none'
                        }`}>
                          {msg.content}

                        <div className="text-[8px] text-slate-400 font-semibold tracking-wider px-1 flex items-center justify-end gap-1.5">
                          <span>{formatChatTime(msg.timestamp)}</span>
                          {isSelf ? (
                            ((msg.channelId === 'direct' 
                              ? (msg.readBy || []).includes(msg.receiver)
                              : (msg.readBy || []).filter(u => u !== currentUser.username).length > 0) ? (
                              <span className="text-sky-400" title="Sudah Dibaca"><i data-lucide="check-check" className="w-3.5 h-3.5 inline"></i></span>

                              <span className="text-slate-300 dark:text-slate-500" title="Terkirim"><i data-lucide="check" className="w-3.5 h-3.5 inline"></i></span>

                      {/* Self Avatar */}

                        userPhotos[msg.sender] ? (
                          <img src={userPhotos[msg.sender]} className="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-slate-250/20" />

                          <div className="w-8 h-8 rounded-full bg-primary-600/10 text-primary-600 dark:text-primary-400 flex items-center justify-center font-black uppercase flex-shrink-0 text-xs">
                            {msg.sender[0]}
                          </div>

                })
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Input Bar */}
            <form onSubmit={handleSendMessage} className="p-4 border-t border-slate-150/80 dark:border-slate-850 bg-white dark:bg-slate-955 flex items-center gap-3">
              <input 
                type="text" 
                value={messageText} 
                onChange={(e) => setMessageText(e.target.value)} 
                onKeyDown={handleKeyPress}
                placeholder={`Ketik pesan untuk ${selectedRoomObj?.name}...`} 
                className="flex-1 px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white font-semibold text-xs" 
              />
              <button 
                type="submit" 
                disabled={!messageText.trim()}
                className="bg-primary-600 hover:bg-primary-700 disabled:opacity-50 disabled:hover:bg-primary-600 text-white p-3 rounded-xl shadow-lg shadow-primary-950/15 flex items-center justify-center transition-all flex-shrink-0 animate-pulse"
              >

              </button>
            </form>
          </div>

        </div>
      );
    }

    // ==========================================
    // 12. PROFILE SETTINGS MODULE
    // ==========================================
    function ProfileSettingsModule({ currentUser, showToast, logActivity, setCurrentUser, reloadData }) {
      const [oldPassword, setOldPassword] = React.useState('');
      const [newPassword, setNewPassword] = React.useState('');
      const [confirmNewPassword, setConfirmNewPassword] = React.useState('');
      const [profilePic, setProfilePic] = React.useState(currentUser?.profilePic || '');
      const [showOldPassword, setShowOldPassword] = React.useState(false);
      const [showNewPassword, setShowNewPassword] = React.useState(false);
      const [showConfirmNewPassword, setShowConfirmNewPassword] = React.useState(false);

      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.size > 2 * 1024 * 1024) {
          showToast('Ukuran berkas gambar maksimal adalah 2MB!', 'error');
          return;
        }

        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64String = reader.result;
          setProfilePic(base64String);
          try {
            const userList = await getAllFromStore('users');
            const userInDb = userList.find(u => u.username === currentUser.username);
            if (userInDb) {
              userInDb.profilePic = base64String;
              await saveToStore('users', userInDb);
              
              const updatedUser = { ...currentUser, profilePic: base64String };
              setCurrentUser(updatedUser);
              localStorage.setItem('pt_ar_user', JSON.stringify(updatedUser));
              showToast('Foto profil berhasil diperbarui.');
              await logActivity('Ubah Foto Profil', `Foto profil ${currentUser.username} diperbarui.`);
              if (reloadData) reloadData();
            }
          } catch (err) {
            console.error(err);
            showToast('Gagal menyimpan foto profil.', 'error');
          }
        };
        reader.readAsDataURL(file);
      };

      const handlePasswordChange = async (e) => {
        e.preventDefault();
        if (!oldPassword || !newPassword || !confirmNewPassword) {
          showToast('Harap lengkapi semua kolom password!', 'error');
          return;
        }

        if (newPassword !== confirmNewPassword) {
          showToast('Konfirmasi password baru tidak cocok!', 'error');
          return;
        }

        try {
          const userList = await getAllFromStore('users');
          const userInDb = userList.find(u => u.username === currentUser.username);
          if (userInDb) {
            const oldHash = await hashPassword(oldPassword);
            if (userInDb.passwordHash !== oldHash) {
              showToast('Password lama Anda salah!', 'error');
              return;
            }

            const newHash = await hashPassword(newPassword);
            userInDb.passwordHash = newHash;
            userInDb.plainPassword = newPassword;
            await saveToStore('users', userInDb);

            const updatedUser = { ...currentUser, passwordHash: newHash };
            setCurrentUser(updatedUser);
            localStorage.setItem('pt_ar_user', JSON.stringify(updatedUser));

            showToast('Password berhasil diubah.');
            await logActivity('Ubah Password', `Password ${currentUser.username} diperbarui.`);
            setOldPassword('');
            setNewPassword('');
            setConfirmNewPassword('');
          }
        } catch (err) {
          console.error(err);
          showToast('Gagal mengubah password.', 'error');
        }
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-xs font-semibold animate-fade-in">
          {/* Profile Picture Card */}
          <div className="bg-white p-6 rounded-2xl border border-slate-150 shadow-sm flex flex-col items-center justify-center space-y-4">
            <h4 className="font-bold text-[10px] text-slate-400 uppercase tracking-wider border-b pb-2 w-full text-center">
              Foto Profil
            </h4>
            
            <div className="relative group">
              {profilePic ? (
                <img src={profilePic} className="w-28 h-28 rounded-full object-cover border-2 border-slate-200 shadow-md animate-fade-in" />
              ) : (
                <div className="w-28 h-28 rounded-full bg-slate-100 flex items-center justify-center font-bold text-3xl uppercase text-slate-400 border border-slate-200 shadow-sm">
                  {currentUser?.username[0]}
                </div>
              )}
              <label className="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                <span className="text-[10px] text-white font-bold flex items-center gap-1">
                  <i data-lucide="camera" className="w-3.5 h-3.5"></i> Ganti
                </span>
                <input type="file" accept="image/*" onChange={handleImageChange} className="hidden" />
              </label>
            </div>
            
            <div className="text-center">
              <span className="font-bold text-slate-800 text-sm block capitalize">{currentUser?.username}</span>
              <span className="text-[9px] uppercase tracking-wider text-slate-400 font-bold block mt-0.5">{currentUser?.role}</span>
            </div>
            <p className="text-[9px] text-slate-400 text-center leading-relaxed font-normal">
              Mendukung berkas JPG, PNG, atau GIF dengan ukuran maksimal 2MB. Foto profil ini akan otomatis muncul pada bilah komunikasi/pesan.
            </p>
          </div>

          {/* Change Password Card */}
          <div className="md:col-span-2 bg-white p-6 rounded-2xl border border-slate-150 shadow-sm space-y-4">
            <h4 className="font-bold text-[10px] text-slate-400 uppercase tracking-wider border-b pb-2 w-full">
              Ubah Kata Sandi
            </h4>

            <form onSubmit={handlePasswordChange} className="space-y-4 max-w-md">
              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Kata Sandi Lama *</label>
                <div className="relative">
                  <input
                    type={showOldPassword ? "text" : "password"}
                    required
                    value={oldPassword}
                    onChange={(e) => setOldPassword(e.target.value)}
                    placeholder="••••••••"
                    className="w-full bg-slate-50 border border-slate-200 pl-3 pr-10 py-2 rounded-xl focus:border-primary-500 focus:outline-none"
                  />
                  <button
                    type="button"
                    onClick={() => setShowOldPassword(!showOldPassword)}
                    className="absolute inset-y-0 right-3.5 flex items-center text-slate-400 hover:text-slate-655 focus:outline-none"
                  >
                    <i data-lucide={showOldPassword ? "eye-off" : "eye"} className="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Kata Sandi Baru *</label>
                <div className="relative">
                  <input
                    type={showNewPassword ? "text" : "password"}
                    required
                    value={newPassword}
                    onChange={(e) => setNewPassword(e.target.value)}
                    placeholder="••••••••"
                    className="w-full bg-slate-50 border border-slate-200 pl-3 pr-10 py-2 rounded-xl focus:border-primary-500 focus:outline-none"
                  />
                  <button
                    type="button"
                    onClick={() => setShowNewPassword(!showNewPassword)}
                    className="absolute inset-y-0 right-3.5 flex items-center text-slate-400 hover:text-slate-655 focus:outline-none"
                  >
                    <i data-lucide={showNewPassword ? "eye-off" : "eye"} className="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Konfirmasi Kata Sandi Baru *</label>
                <div className="relative">
                  <input
                    type={showConfirmNewPassword ? "text" : "password"}
                    required
                    value={confirmNewPassword}
                    onChange={(e) => setConfirmNewPassword(e.target.value)}
                    placeholder="••••••••"
                    className="w-full bg-slate-50 border border-slate-200 pl-3 pr-10 py-2 rounded-xl focus:border-primary-500 focus:outline-none"
                  />
                  <button
                    type="button"
                    onClick={() => setShowConfirmNewPassword(!showConfirmNewPassword)}
                    className="absolute inset-y-0 right-3.5 flex items-center text-slate-400 hover:text-slate-655 focus:outline-none"
                  >
                    <i data-lucide={showConfirmNewPassword ? "eye-off" : "eye"} className="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <div className="flex justify-end pt-2">
                <button
                  type="submit"
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-5 py-2.5 rounded-xl shadow-lg shadow-primary-950/15"
                >
                  Simpan Kata Sandi
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // 12.5 KALKULATOR BUDGET PO MODULE
    // ==========================================
    function KalkulatorPOModule({ barangList, priceLists, suppliers, customers, currentUser, poList, reloadData, showToast, logActivity }) {
      const [branchName, setBranchName] = React.useState('');
      const [supplierId, setSupplierId] = React.useState('');
      const [customerName, setCustomerName] = React.useState('');
      const [poDate, setPoDate] = React.useState(new Date().toISOString().split('T')[0]);
      const [notes, setNotes] = React.useState('');
      const [budgetLimit, setBudgetLimit] = React.useState('');
      const [items, setItems] = React.useState([{ barangId: '', qty: 1, price: 0, total: 0 }]);

      // Set default values based on role & customer mapping
      React.useEffect(() => {
        if (currentUser?.customerId) {
          const match = customers.find(c => c.id === currentUser.customerId);
          if (match) {
            setCustomerName(match.name);
            setBranchName(match.company || match.name);
          }
        } else if (currentUser?.role === 'sppg') {
          setBranchName('SPPG ' + currentUser.username);
        } else if (currentUser?.role === 'mitra') {
          const match = customers.find(c => 
            c.name.toLowerCase() === currentUser.username.toLowerCase() || 
            c.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
            c.company.toLowerCase().includes(currentUser.username.toLowerCase())
          );
          if (match) {
            setCustomerName(match.name);
            setBranchName(match.company || match.name);
          } else {
            setCustomerName(currentUser.username);
            setBranchName(currentUser.username);
          }
        } else {
          setBranchName('SPPG ' + (currentUser?.username || ''));
        }

        const handleSupplierSetup = async () => {
          if (suppliers.length > 0) {
            const arSupplier = suppliers.find(s => s.name.toUpperCase().includes('AR MULTI KARYA'));
            if (arSupplier) {
              setSupplierId(String(arSupplier.id));
            } else {
              if (currentUser?.role === 'sppg' || currentUser?.role === 'mitra') {
                try {
                  const newId = await saveToStore('suppliers', {
                    name: 'PT AR MULTI KARYA',
                    code: 'SPL-AR',
                    phone: '',
                    email: '',
                    address: 'Magelang, Jawa Tengah'
                  });
                  setSupplierId(String(newId));
                  reloadData();
                } catch(e) {
                  console.error(e);
                  setSupplierId(String(suppliers[0].id));
                }
              } else {
                const semenSupplier = suppliers.find(s => s.name.toLowerCase().includes('semen'));
                setSupplierId(String(semenSupplier ? semenSupplier.id : suppliers[0].id));
              }
            }
          }
        };

        handleSupplierSetup();
      }, [currentUser, customers, suppliers]);

      React.useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [items.length]);

      const handleAddItem = () => {
        setItems([...items, { barangId: '', qty: 1, price: 0, total: 0 }]);
      };

      const handleRemoveItem = (index) => {
        if (items.length === 1) return;
        setItems(items.filter((_, idx) => idx !== index));
      };

      const handleItemChange = (index, field, value) => {
        const updated = [...items];
        updated[index][field] = value;

        if (field === 'barangId') {
          const matchedItem = barangList.find(b => b.id === Number(value));
          if (matchedItem) {
            const matchedPrices = priceLists.filter(p => p.barangId === Number(value));
            if (matchedPrices.length > 0) {
              matchedPrices.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
              updated[index].price = matchedPrices[0].hargaJual || 0;
            } else {
              updated[index].price = 0;
            }
          } else {
            updated[index].price = 0;
          }
        }

        const qty = Number(updated[index].qty) || 0;
        const price = Number(updated[index].price) || 0;
        updated[index].total = qty * price;

        setItems(updated);
      };

      const grandTotal = items.reduce((sum, it) => sum + (Number(it.qty) * Number(it.price) || 0), 0);
      const isOverLimit = budgetLimit && Number(budgetLimit) > 0 && grandTotal > Number(budgetLimit);

      const handleSaveAsDraft = async () => {
        if (!customerName.trim()) {
          alert('Harap isi nama Pemesan!');
          return;
        }
        if (items.some(it => !it.barangId)) {
          alert('Harap lengkapi pilihan barang pada semua baris!');
          return;
        }

        const nextNum = 'PO-' + new Date().getFullYear() + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(poList.length + 1).padStart(4, '0');
        
        let matchedCust = customers.find(c => c.name.toLowerCase() === customerName.toLowerCase().trim());
        let finalCustomerId = 0;
        if (matchedCust) {
          finalCustomerId = matchedCust.id;
        } else {
          finalCustomerId = await saveToStore('customers', {
            name: customerName.trim(),
            company: customerName.trim(),
            phone: '',
            email: '',
            address: ''
          });
        }
        
        const data = {
          poNumber: nextNum,
          supplierId: Number(supplierId) || 0,
          poDate,
          deliveryRequestDate: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
          status: 'Draft',
          jenis: 'Barang',
          deskripsi: notes || 'Perhitungan PO dari kalkulator budget',
          createdByDetail: branchName,
          createdBy: currentUser.username,
          customerId: finalCustomerId,
          budgetLimit: budgetLimit ? Number(budgetLimit) : 0,
          items: items.map(it => ({
            barangId: Number(it.barangId),
            qty: Number(it.qty),
            price: Number(it.price),
            total: Number(it.qty) * Number(it.price)
          })),
          totalAmount: grandTotal
        };

        try {
          await saveToStore('po', data);
          await logActivity('Tambah PO dari Kalkulator', `PO Draft ${nextNum} dibuat dari kalkulator oleh ${branchName}.`);
          showToast(`PO ${nextNum} berhasil disimpan ke Draf.`);
          reloadData();
        } catch (err) {
          console.error(err);
          showToast('Gagal menyimpan PO.', 'error');
        }
      };

      const handleExportExcel = () => {
        if (items.some(it => !it.barangId)) {
          alert('Harap lengkapi pilihan barang sebelum ekspor!');
          return;
        }

        const selectedSupplier = suppliers.find(s => s.id === Number(supplierId))?.name || 'PT AR MULTI KARYA';
        const selectedCustomer = customerName || '-';

        const rows = [
          [],
          ['', `PURCHASE ORDER (PO) ${branchName.toUpperCase()}`],
          [],
          ['', 'NO PO :', `PO-CALC-${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, '0')}`, '', '', 'SUPPLIER :', selectedSupplier],
          ['', 'TANGGAL PO :', poDate, '', '', 'MITRA / CUST :', selectedCustomer],
          ['', 'KETERANGAN :', notes || '-'],
          [],
          ['', 'NO', 'KODE BARANG', 'NAMA BARANG', 'QTY', 'HARGA', 'TOTAL NOMINAL']
        ];

        items.forEach((it, idx) => {
          const brg = barangList.find(b => b.id === Number(it.barangId));
          rows.push([
            '',
            idx + 1,
            brg ? brg.code : '',
            brg ? brg.name : '',
            Number(it.qty),
            Number(it.price),
            Number(it.total)
          ]);
        });

        rows.push([]);
        rows.push(['', 'TOTAL NOMINAL PO :', '', '', '', '', grandTotal]);

        const ws = XLSX.utils.aoa_to_sheet(rows);
        
        if(!ws['!merges']) ws['!merges'] = [];
        ws['!merges'].push({ s: { r: 1, c: 1 }, e: { r: 1, c: 6 } });

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'PO CALCULATION');
        XLSX.writeFile(wb, `PO_Calculation_${branchName.replace(/\s+/g, '_')}_${poDate}.xlsx`);
        showToast('File Excel berhasil diunduh.');
      };

      const handleReset = () => {
        if (confirm('Apakah Anda yakin ingin mereset kalkulator?')) {
          setItems([{ barangId: '', qty: 1, price: 0, total: 0 }]);
          setNotes('');
          setBudgetLimit('');
          if (currentUser?.role !== 'mitra') {
            setCustomerName('');
          }
        }
      };

      return (
        <div className="space-y-6 animate-fade-in text-xs font-semibold">
          <div className="flex justify-between items-center no-print">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Kalkulator Budget PO</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Simulasi penghitungan biaya Purchase Order (PO) cabang</span>
            </div>
            <div className="flex gap-2">
              <button 
                onClick={handleReset}
                className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-4 py-2.5 rounded-xl flex items-center gap-2 border border-slate-200"
              >
                <i data-lucide="refresh-cw" className="w-3.5 h-3.5"></i> Reset
              </button>
              <button 
                onClick={handleExportExcel}
                className="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-lg shadow-green-950/10"
              >
                <i data-lucide="file-spreadsheet" className="w-3.5 h-3.5"></i> Ekspor Excel
              </button>
              {currentUser?.role !== 'mitra' && (
                <button 
                  onClick={handleSaveAsDraft}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-lg shadow-primary-950/10"
                >
                  <i data-lucide="save" className="w-3.5 h-3.5"></i> Simpan ke Draf PO
                </button>
              )}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-1 bg-white dark:bg-slate-955 p-6 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm space-y-4">
              <h4 className="font-bold text-xs uppercase text-slate-500 pb-2 border-b border-slate-100 dark:border-slate-855">Detail Pengajuan</h4>
              
              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Cabang / Pembuat PO</label>
                <input 
                  type="text" 
                  value={branchName} 
                  onChange={(e) => setBranchName(e.target.value)} 
                  className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3.5 py-2.5 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white"
                />
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Supplier</label>
                <select 
                  value={supplierId} 
                  disabled={currentUser?.role === 'sppg' || currentUser?.role === 'mitra'}
                  onChange={(e) => setSupplierId(e.target.value)}
                  className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3.5 py-2.5 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white disabled:opacity-75"
                >
                  <option value="">Pilih Supplier</option>
                  {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Nama Pemesan</label>
                <input 
                  type="text" 
                  value={customerName} 
                  onChange={(e) => setCustomerName(e.target.value)} 
                  readOnly={currentUser?.role === 'mitra' || !!currentUser?.customerId}
                  placeholder="Tulis nama customer..."
                  className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3.5 py-2.5 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white read-only:opacity-75"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Tanggal PO</label>
                  <input 
                    type="date" 
                    value={poDate} 
                    onChange={(e) => setPoDate(e.target.value)} 
                    className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Limit Budget (IDR)</label>
                  <input 
                    type="number" 
                    value={budgetLimit} 
                    onChange={(e) => setBudgetLimit(e.target.value)} 
                    placeholder="misal: 10000000"
                    className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white"
                  />
                </div>
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1.5">Keterangan / Deskripsi</label>
                <textarea 
                  rows="3" 
                  value={notes} 
                  onChange={(e) => setNotes(e.target.value)} 
                  placeholder="Kebutuhan proyek atau catatan tambahan..."
                  className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3.5 py-2.5 rounded-xl focus:border-sky-500 focus:outline-none dark:text-white"
                />
              </div>
            </div>

            <div className="lg:col-span-2 space-y-6">
              <div className="bg-white dark:bg-slate-955 p-6 rounded-2xl border border-slate-150 dark:border-slate-855 shadow-sm">
                <div className="flex justify-between items-center pb-3 border-b border-slate-100 dark:border-slate-855 mb-4">
                  <h4 className="font-bold text-xs uppercase text-slate-500">Daftar Barang yang di-PO</h4>
                  <button 
                    onClick={handleAddItem}
                    className="bg-primary-50 hover:bg-primary-100 text-primary-655 text-[11px] font-bold px-3 py-1.5 rounded-xl border border-primary-200 flex items-center gap-1.5"
                  >
                    <i data-lucide="plus" className="w-3.5 h-3.5"></i> Tambah Barang
                  </button>
                </div>

                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs border-collapse">
                    <thead>
                      <tr className="text-slate-400 uppercase text-[9px] border-b border-slate-100 dark:border-slate-855 pb-2">
                        <th className="py-2 pr-4 w-[40%]">Nama Barang</th>
                        <th className="py-2 px-2 w-[15%]">Satuan</th>
                        <th className="py-2 px-2 w-[15%]">Qty</th>
                        <th className="py-2 px-2 w-[15%] text-right">Harga</th>
                        <th className="py-2 pl-4 w-[15%] text-right">Total</th>
                        <th className="py-2 pl-2 w-8"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                      {items.map((item, idx) => {
                        const matchedBarang = barangList.find(b => b.id === Number(item.barangId));
                        return (
                          <tr key={idx} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/5">
                            <td className="py-3 pr-4">
                              <select 
                                value={item.barangId}
                                onChange={(e) => handleItemChange(idx, 'barangId', e.target.value)}
                                className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-2 py-1.5 rounded-lg focus:outline-none dark:text-white"
                              >
                                <option value="">Pilih Barang...</option>
                                {barangList.map(b => (
                                  <option key={b.id} value={b.id}>{b.code} - {b.name}</option>
                                ))}
                              </select>
                            </td>
                            <td className="py-3 px-2">
                              <span className="px-2 py-1 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-slate-500 font-mono text-[10px]">
                                {matchedBarang?.unit || '-'}
                              </span>
                            </td>
                            <td className="py-3 px-2">
                              <input 
                                type="number" 
                                min="1"
                                value={item.qty}
                                onChange={(e) => handleItemChange(idx, 'qty', e.target.value)}
                                className="w-20 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-2 py-1.5 rounded-lg focus:outline-none dark:text-white font-mono"
                              />
                            </td>
                            <td className="py-3 px-2 text-right font-mono text-slate-600 dark:text-slate-350">
                              {formatRupiah(item.price)}
                            </td>
                            <td className="py-3 pl-4 text-right font-mono font-bold text-slate-855 dark:text-white">
                              {formatRupiah(item.total)}
                            </td>
                            <td className="py-3 pl-2 text-right">
                              <button 
                                disabled={items.length === 1}
                                onClick={() => handleRemoveItem(idx)}
                                className="text-slate-400 hover:text-red-500 disabled:opacity-50"
                              >
                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="bg-gradient-to-br from-slate-900 to-indigo-950 text-white p-6 rounded-2xl shadow-xl space-y-4">
                <div className="flex justify-between items-center">
                  <div>
                    <h5 className="text-[10px] text-indigo-200 uppercase tracking-widest font-bold">TOTAL ANGGARAN DIBUTUHKAN</h5>
                    <span className="text-2xl font-extrabold tracking-tight block mt-1">{formatRupiah(grandTotal)}</span>
                  </div>
                  <div className="flex items-center justify-center w-12 h-12 bg-white/10 rounded-full">
                    <i data-lucide="calculator" className="w-6 h-6 text-indigo-300"></i>
                  </div>
                </div>

                <div className="border-t border-white/10 pt-3">
                  <span className="text-[9px] text-indigo-250 uppercase font-bold tracking-wide">Terbilang (Spelled Out):</span>
                  <p className="text-[10px] font-normal italic text-slate-100 mt-1 leading-relaxed bg-white/5 p-3 rounded-xl border border-white/5">
                    {formatTerbilangRupiah(grandTotal)}
                  </p>
                </div>

                {budgetLimit && Number(budgetLimit) > 0 && (
                  <div className={`p-3 rounded-xl border flex items-center gap-3 text-[10px] font-bold ${
                    isOverLimit 
                      ? 'bg-red-500/10 border-red-500/30 text-red-300' 
                      : 'bg-green-500/10 border-green-500/30 text-green-300'
                  }`}>
                    <i data-lucide={isOverLimit ? "alert-triangle" : "check-circle"} className="w-4 h-4 flex-shrink-0"></i>
                    <div>
                      {isOverLimit 
                        ? `Melebihi limit budget sebesar ${formatRupiah(grandTotal - Number(budgetLimit))}!` 
                        : `Sesuai budget! Sisa anggaran simulasi: ${formatRupiah(Number(budgetLimit) - grandTotal)}`}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 13. USER MANAGEMENT MODULE
    // ==========================================
    function UserManagementModule({ showToast, logActivity, customers = [] }) {
      const [users, setUsers] = React.useState([]);
      const [modalOpen, setModalOpen] = React.useState(false);
      const [editUser, setEditUser] = React.useState(null);

      // Form fields
      const [username, setUsername] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [role, setRole] = React.useState('mitra');
      const [whatsapp, setWhatsapp] = React.useState('');
      const [customerId, setCustomerId] = React.useState('');
      const [showPassword, setShowPassword] = React.useState(false);

      const fetchUsers = async () => {
        try {
          const list = await getAllFromStore('users');
          setUsers(list);
        } catch (err) {
          console.error(err);
        }
      };

      React.useEffect(() => {
        fetchUsers();
      }, []);

      React.useEffect(() => {
        if (modalOpen && window.lucide) {
          setTimeout(() => {
            window.lucide.createIcons();
          }, 50);
        }
      }, [modalOpen, showPassword]);

      const handleSave = async (e) => {
        e.preventDefault();
        if (!username) {
          alert('Harap isi username!');
          return;
        }

        try {
          const hash = password ? await hashPassword(password) : (editUser ? editUser.passwordHash : '');
          const plain = password ? password : (editUser ? editUser.plainPassword : '');
          const data = {
            username: username.toLowerCase().trim(),
            passwordHash: hash,
            role,
            whatsapp: whatsapp.trim(),
            plainPassword: plain,
            profilePic: editUser ? editUser.profilePic : '',
            customerId: (role === 'sppg' || role === 'mitra') && customerId ? Number(customerId) : null
          };
          if (editUser) {
            data.id = editUser.id;
          }

          await saveToStore('users', data);
          showToast(editUser ? 'Data pengguna berhasil diperbarui.' : 'Pengguna baru berhasil ditambahkan.');
          await logActivity(editUser ? 'Ubah Pengguna' : 'Tambah Pengguna', `Pengguna ${username} (${role}) disimpan.`);
          
          setModalOpen(false);
          setUsername('');
          setPassword('');
          setRole('mitra');
          setWhatsapp('');
          setCustomerId('');
          setEditUser(null);
          fetchUsers();
        } catch (err) {
          console.error(err);
          showToast('Gagal menyimpan pengguna.', 'error');
        }
      };

      const handleDelete = async (u) => {
        if (u.id === 1 || u.username === 'admin') {
          alert('Pengguna admin utama tidak dapat dihapus!');
          return;
        }
        if (confirm(`Apakah Anda yakin ingin menghapus pengguna "${u.username}"?`)) {
          try {
            await deleteFromStore('users', u.id);
            showToast('Pengguna berhasil dihapus.', 'error');
            await logActivity('Hapus Pengguna', `Pengguna ${u.username} dihapus.`);
            fetchUsers();
          } catch (err) {
            console.error(err);
            showToast('Gagal menghapus pengguna.', 'error');
          }
        }
      };

      return (
        <div className="space-y-6 animate-fade-in text-xs font-semibold">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Manajemen Akun Pengguna</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Kelola kredensial dan hak akses akun sistem</span>
            </div>
            <button 
              onClick={() => {
                setUsername('');
                setPassword('');
                setRole('mitra');
                setWhatsapp('');
                setCustomerId('');
                setEditUser(null);
                setModalOpen(true);
              }}
              className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/10 flex items-center gap-2"
            >
              <i data-lucide="plus" className="w-3.5 h-3.5"></i> Tambah Pengguna Baru
            </button>
          </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-850 shadow-sm overflow-hidden">
            <table className="w-full text-left border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-855 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">ID</th>
                  <th className="py-4 px-6">Username</th>
                  <th className="py-4 px-6">Role / Hak Akses</th>
                  <th className="py-4 px-6">No. WhatsApp</th>
                  <th className="py-4 px-6">Hubungan Customer</th>
                  <th className="py-4 px-6">Kata Sandi</th>
                  <th className="py-4 px-6 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {users.map(u => (
                  <tr key={u.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                    <td className="py-4 px-6 font-mono font-bold text-slate-400">{u.id}</td>
                    <td className="py-4 px-6 font-extrabold text-slate-855 dark:text-white">{u.username}</td>
                    <td className="py-4 px-6">
                      <span className={`px-2 py-0.5 rounded text-[10px] font-extrabold uppercase ${
                        u.role === 'admin' ? 'bg-red-50 text-red-655 dark:bg-red-955/20 dark:text-red-400' :
                        u.role === 'finance' ? 'bg-green-50 text-green-655 dark:bg-green-955/20 dark:text-green-400' :
                        u.role === 'sppg' ? 'bg-blue-50 text-blue-655 dark:bg-blue-955/20 dark:text-blue-400' :
                        'bg-amber-50 text-amber-655 dark:bg-amber-955/20 dark:text-amber-400'
                      }`}>{u.role}</span>
                    </td>
                    <td className="py-4 px-6 font-mono font-semibold text-slate-600 dark:text-slate-350">{u.whatsapp || '-'}</td>
                    <td className="py-4 px-6 font-semibold text-slate-700 dark:text-slate-300">
                      {u.customerId ? (customers.find(c => c.id === u.customerId)?.name || `ID: ${u.customerId}`) : '-'}
                    </td>
                    <td className="py-4 px-6 font-mono font-semibold text-slate-700 dark:text-slate-300">
                      <span className="px-1.5 py-0.5 rounded bg-slate-50 border border-slate-200">{u.plainPassword || u.username}</span>
                    </td>
                    <td className="py-4 px-6 text-right">
                      <div className="inline-flex gap-2">
                        <button 
                          onClick={() => {
                            setEditUser(u);
                            setUsername(u.username);
                            setPassword('');
                            setRole(u.role);
                            setWhatsapp(u.whatsapp || '');
                            setCustomerId(u.customerId || '');
                            setModalOpen(true);
                          }}
                          className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-green-600"
                        >
                          <i data-lucide="edit-3" className="w-3.5 h-3.5"></i>
                        </button>
                        {u.username !== 'admin' && (
                          <button 
                            onClick={() => handleDelete(u)}
                            className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-red-655 hover:border-red-200"
                          >
                            <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {modalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-955 w-full max-w-sm rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-855 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">{editUser ? 'Edit Kredensial User' : 'Registrasi Akun Baru'}</h4>
                  <button onClick={() => setModalOpen(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                <form onSubmit={handleSave} className="p-6 space-y-4">
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Username *</label>
                    <input type="text" required value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Password {editUser && '(Kosongkan jika tidak diubah)'} *</label>
                    <div className="relative">
                      <input
                        type={showPassword ? "text" : "password"}
                        required={!editUser}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 pl-3 pr-10 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white"
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-655 focus:outline-none"
                      >
                        <i data-lucide={showPassword ? "eye-off" : "eye"} className="w-3.5 h-3.5"></i>
                      </button>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">No. WhatsApp *</label>
                    <input type="text" required value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} placeholder="Contoh: 081234567890" className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white" />
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Role / Hak Akses *</label>
                    <select value={role} onChange={(e) => setRole(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white">
                      <option value="admin">Admin (Akses Penuh)</option>
                      <option value="finance">Finance</option>
                      <option value="sppg">SPPG</option>
                      <option value="mitra">Mitra</option>
                    </select>
                  </div>
                  {(role === 'sppg' || role === 'mitra') && (
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Hubungkan ke Customer / Cabang</label>
                      <select 
                        value={customerId} 
                        onChange={(e) => setCustomerId(e.target.value)} 
                        className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white text-xs"
                      >
                        <option value="">-- Pilih Customer --</option>
                        {customers.map(c => (
                          <option key={c.id} value={c.id}>{c.name}</option>
                        ))}
                      </select>
                    </div>
                  )}
                  <div className="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-855">
                    <button type="button" onClick={() => setModalOpen(false)} className="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-500 text-xs font-bold hover:bg-slate-50">Batal</button>
                    <button type="submit" className="px-5 py-2 rounded-xl bg-primary-600 hover:bg-primary-700 text-white text-xs font-bold shadow-lg shadow-primary-950/10">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================

    // ==========================================
    // 14. BOOTSTRAP REACT APP
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
