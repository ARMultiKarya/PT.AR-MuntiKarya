          )}

          {/* Modal Catat Penerimaan Barang */}
          {receiptPO && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-2xl rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in flex flex-col max-h-[90vh]">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-855 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">Catat Penerimaan Barang PO: {receiptPO.poNumber}</h4>
                  <button onClick={() => setReceiptPO(null)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>

                <form onSubmit={handleSaveReceipt} className="p-6 flex-1 overflow-y-auto space-y-4 text-xs font-semibold">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Tanggal Terima *</label>
                      <input type="date" required value={receiptDate} onChange={(e) => setReceiptDate(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white" />
                    </div>
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Upload Berkas Surat Jalan (Gambar/PDF) *</label>
                      <input type="file" required onChange={handleReceiptFileChange} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-1.5 rounded-xl focus:outline-none dark:text-white text-xs font-semibold" />
                    </div>
                  </div>

                  <div className="border-t border-slate-100 dark:border-slate-855 pt-4">
                    <h5 className="font-bold text-[10px] text-slate-450 uppercase tracking-wider mb-3">Penerimaan Item Barang</h5>
                    <div className="space-y-3">
                      {receivedItems.map((item, idx) => {
                        const b = barangList.find(x => x.id === item.barangId);
                        const remaining = item.qtyOrdered - item.qtyPrev;
                        return (
                          <div key={idx} className="grid grid-cols-12 gap-3 items-center border-b border-slate-50 dark:border-slate-900 pb-2">
                            <div className="col-span-5">
                              <span className="block font-extrabold text-xs text-slate-800 dark:text-white">{b ? b.name : 'Barang'}</span>
                              <span className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Total PO: {item.qtyOrdered} {b ? b.unit : ''}</span>
                            </div>
                            <div className="col-span-3 text-center">
                              <span className="block text-[8px] text-slate-400 uppercase">Telah Diterima</span>
                              <span className="font-extrabold text-green-600">{item.qtyPrev} {b ? b.unit : ''}</span>
                            </div>
                            <div className="col-span-4">
                              <label className="block text-[8px] text-slate-455 uppercase mb-0.5">Diterima Sekarang (Sisa: {remaining})</label>
                              <input 
                                type="number" 
                                required 
                                min="0"
                                max={remaining}
                                placeholder="Qty Terima" 
                                value={item.qtyNow} 
                                onChange={(e) => handleReceiptQtyChange(idx, e.target.value)}
                                className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-1 rounded-lg text-xs font-bold text-center" 
                              />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* History of receipts on this PO */}
                  {receiptPO.receipts && receiptPO.receipts.length > 0 && (
                    <div className="border-t border-slate-100 dark:border-slate-855 pt-4">
                      <h5 className="font-bold text-[10px] text-slate-450 uppercase tracking-wider mb-2">Riwayat Penerimaan Sebelumnya</h5>
                      <div className="space-y-2">
                        {receiptPO.receipts.map((r, rIdx) => (
                          <div key={rIdx} className="bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-150 dark:border-slate-800 flex justify-between items-center">
                            <div>
                              <div className="font-bold text-[10px] text-slate-650 dark:text-slate-350">Penerimaan #{rIdx + 1} - {r.date}</div>
                              <div className="mt-1 flex flex-wrap gap-2 text-[9px] font-semibold text-slate-550">
                                {r.items.map((it, itIdx) => {
                                  const b = barangList.find(x => x.id === it.barangId);
                                  return (
                                    <span key={itIdx} className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded">
                                      {b ? b.name : 'Barang'}: {it.qtyReceived}
                                    </span>
                                  );
                                })}
                              </div>
                            </div>
                            <a href={r.fileBukti} download={`SuratJalan_${receiptPO.poNumber}_Rec${rIdx+1}`} className="text-primary-600 font-extrabold text-[10px] flex items-center gap-0.5">
                              <i data-lucide="download" className="w-3 h-3"></i> Unduh SJ
                            </a>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="flex justify-end gap-3 pt-6 border-t border-slate-100 dark:border-slate-855">
                    <button type="button" onClick={() => setReceiptPO(null)} className="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-500 text-xs font-bold hover:bg-slate-50">Batal</button>
                    <button type="submit" className="px-5 py-2 rounded-xl bg-primary-600 hover:bg-primary-700 text-white text-xs font-bold shadow-lg shadow-primary-950/10">Simpan Penerimaan</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal Preview File Berkas */}
          {previewFileModal && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-3xl rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col max-h-[90vh]">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">{previewFileModal.title}</h4>
                  <button onClick={() => setPreviewFileModal(null)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1 flex justify-center items-center bg-slate-100 dark:bg-slate-900">
                  {previewFileModal.url.startsWith('data:image') || previewFileModal.url.match(/\.(jpeg|jpg|gif|png|webp)$/i) ? (
                    <img src={previewFileModal.url} alt="Bukti Berkas" className="max-w-full max-h-[70vh] object-contain rounded-lg shadow-md" />
                  ) : (
                    <iframe src={previewFileModal.url} className="w-full h-[70vh] rounded-lg border-0" />
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Modal Preview Invoice Document */}
          {viewInvoiceModal && (
            <InvoiceDocumentModal 
              invoice={viewInvoiceModal} 
              customers={customers} 
              barangList={barangList} 
              settings={{ name: 'PT AR MULTI KARYA', address: 'Pusat Operasional AR Multi Karya', phone: '0812-3456-7890', email: 'finance@armultikarya.co.id' }}
              onClose={() => setViewInvoiceModal(null)} 
              onPrint={handlePrintInvoice}
            />
          )}
        </div>
      );
    }

    // ==========================================
    // 8. BUKTI PEMBELIAN VIEW MODULE
    // ==========================================
    function BuktiPembelianModule({ buktiPembelian, poList, barangList, suppliers, customers, globalSearch, reloadData, logActivity, showToast, currentUser }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const [modalOpen, setModalOpen] = React.useState(false);
      const [viewReceipt, setViewReceipt] = React.useState(null);
      const [filterCreator, setFilterCreator] = React.useState('');

      // Fields
      const [receiptNumber, setReceiptNumber] = React.useState('');
      const [poId, setPoId] = React.useState('');
      const [supplierId, setSupplierId] = React.useState('');
      const [receiptDate, setReceiptDate] = React.useState('');
      const [fileBukti, setFileBukti] = React.useState('');
      const [editingId, setEditingId] = React.useState(null);
      const [items, setItems] = React.useState([]);

      const handleAddItem = () => {
        setItems([...items, { barangId: '', qty: 1, unitCost: 0 }]);
      };

      const handleRemoveItem = (index) => {
        const updated = items.filter((_, i) => i !== index);
        setItems(updated);
      };

      const handleItemChange = (index, field, value) => {
        const updated = [...items];
        updated[index][field] = value;
        setItems(updated);
      };

      React.useEffect(() => {
        if ((modalOpen || viewReceipt) && window.lucide) {
          setTimeout(() => {
            window.lucide.createIcons();
          }, 50);
        }
      }, [modalOpen, viewReceipt, items.length]);

      const openModal = () => {
        const num = 'BP-' + new Date().getFullYear() + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(buktiPembelian.length + 1).padStart(4, '0');
        setReceiptNumber(num);
        setPoId('');
        setSupplierId('');
        setReceiptDate(new Date().toISOString().split('T')[0]);
        setFileBukti('');
        setItems([{ barangId: '', qty: 1, unitCost: 0 }]);
        setEditingId(null);
        setModalOpen(true);
      };

      const openEditModal = (b) => {
        setEditingId(b.id);
        setReceiptNumber(b.receiptNumber);
        setPoId(b.poId);
        setSupplierId(b.supplierId || '');
        setReceiptDate(b.receiptDate);
        setFileBukti(b.fileBukti || '');
        setItems(b.items);
        setModalOpen(true);
      };

      const handleCostChange = (idx, cost) => {
        const updated = [...items];
        updated[idx].unitCost = Number(cost);
        setItems(updated);
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          setFileBukti(evt.target.result); // Base64 string
        };
        reader.readAsDataURL(file);
      };

      const handleSave = async (e) => {
        e.preventDefault();
        if (!supplierId || items.some(item => !item.barangId)) {
          alert('Harap lengkapi Supplier dan Barang!');
          return;
        }

        const data = {
          receiptNumber,
          poId: poId ? Number(poId) : null,
          supplierId: Number(supplierId),
          receiptDate,
          fileBukti, // base64 string
          items: items.map(it => ({
            barangId: Number(it.barangId),
            qty: Number(it.qty),
            unitCost: Number(it.unitCost)
          }))
        };

        try {
          if (editingId) {
            data.id = editingId;
            await saveToStore('bukti_pembelian', data);
            showToast(`Bukti transaksi ${receiptNumber} berhasil diupdate.`);
          } else {
            // atomic transaction to save receipt and adjust stock level
            await saveBuktiPembelianTransaction(data, 0);
            showToast(`Bukti Pembelian ${receiptNumber} berhasil disimpan. Stok bertambah.`);
          }
          setModalOpen(false);
          reloadData();
        } catch (err) {
          console.error(err);
          showToast('Gagal menyimpan transaksi.', 'error');
        }
      };

      const handleDelete = async (b) => {
        if (confirm(`Apakah Anda yakin menghapus Bukti Pembelian ${b.receiptNumber}? Tindakan ini akan menarik kembali penambahan stok.`)) {
          try {
            await deleteBuktiPembelianTransaction(b.id, b.receiptNumber, b.items);
            showToast(`Bukti Pembelian ${b.receiptNumber} dibatalkan. Stok disesuaikan.`, 'error');
            reloadData();
          } catch(err) {
            showToast('Gagal membatalkan transaksi.', 'error');
          }
        }
      };

      const handleUploadNota = (e, recordId) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (evt) => {
          const record = buktiPembelian.find(b => b.id === recordId);
          if (record) {
            const dataToSave = { ...record, fileBukti: evt.target.result };
            await saveToStore('bukti_pembelian', dataToSave);
            showToast(`Nota bukti pembelian untuk ${record.receiptNumber} berhasil diunggah.`);
            reloadData();
            setTimeout(() => {
              if (window.lucide) window.lucide.createIcons();
            }, 100);
          }
        };
        reader.readAsDataURL(file);
      };



      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Nomor Bukti, Nomor PO, Tanggal Terima, Total Belanja
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rNumber = row[0] ? String(row[0]).trim() : '';
              const rPONumber = row[1] ? String(row[1]).trim() : '';
              const rDate = row[2] ? String(row[2]).trim() : new Date().toISOString().split('T')[0];
              const rTotal = row[3] ? Number(row[3]) : 0;

              if (!rNumber) continue;

              const matchedPO = poList.find(p => p.poNumber.toLowerCase() === rPONumber.toLowerCase());
              if (!matchedPO) continue;

              // Create default item matching first item in PO
              let bId = matchedPO.items[0] ? matchedPO.items[0].barangId : 1;
              let qty = matchedPO.items[0] ? matchedPO.items[0].qty : 1;

              const newBukti = {
                receiptNumber: rNumber,
                poId: matchedPO.id,
                supplierId: suppliers[0] ? suppliers[0].id : 1,
                receiptDate: rDate,
                items: [{ barangId: bId, qty: qty, unitCost: rTotal / qty }]
              };

              const existing = buktiPembelian.find(b => b.receiptNumber.toLowerCase() === rNumber.toLowerCase());
              if (existing) {
                newBukti.id = existing.id;
              }

              await saveToStore('bukti_pembelian', newBukti);
              importedCount++;
            }

            await logActivity('Import Bukti Pembelian', `${importedCount} bukti pembelian diimpor dari file Excel.`);
            showToast(`${importedCount} bukti pembelian berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Nomor Bukti', 'Nomor PO', 'Supplier', 'Pembuat/SPPG', 'Tanggal Terima', 'Total Belanja (HPP)']
        ];
        buktiPembelian.forEach(b => {
          const po = poList.find(p => p.id === b.poId);
          const sup = suppliers.find(s => s.id === b.supplierId);
          const grandCost = b.items.reduce((sum, item) => sum + (item.qty * item.unitCost), 0);
          rows.push([
            b.receiptNumber,
            po ? po.poNumber : '-',
            sup ? sup.name : '-',
            po ? po.createdByDetail || '' : '',
            b.receiptDate,
            grandCost
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Bukti Pembelian');
        XLSX.writeFile(wb, 'Data_Penerimaan_PT_AR.xlsx');
        logActivity('Export Bukti Pembelian', 'Data penerimaan/bukti pembelian diexport ke Excel.');
        showToast('Data penerimaan berhasil diexport ke Excel.');
      };

      const filtered = buktiPembelian.filter(b => {
        const po = poList.find(p => p.id === b.poId);
        const sup = suppliers.find(s => s.id === b.supplierId);

        // Filter based on linked customerId (scope)
        if (currentUser?.customerId) {
          if (!po || po.customerId !== currentUser.customerId) return false;
        } else {
          // Fallback legacy filters
          if (currentUser?.role === 'sppg') {
            if (!po) return false;
            const isCreatedByMe = po.createdBy === currentUser.username ||
                                (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                                (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
            if (!isCreatedByMe) return false;
          }
          if (currentUser?.role === 'mitra') {
            if (!po) return false;
            const matchedCust = customers.find(c => 
              c.name.toLowerCase() === currentUser.username.toLowerCase() || 
              c.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
              c.company.toLowerCase().includes(currentUser.username.toLowerCase())
            );
            if (!matchedCust || po.customerId !== matchedCust.id) return false;
          }
        }
        
        const matchesSearch = b.receiptNumber.toLowerCase().includes(globalSearch.toLowerCase()) ||
               (sup && sup.name.toLowerCase().includes(globalSearch.toLowerCase()));
               
        const matchesCreator = !filterCreator || 
                               (po && po.createdByDetail && po.createdByDetail.toLowerCase().includes(filterCreator.toLowerCase()));
                               
        return matchesSearch && matchesCreator;
      });

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">Bukti Pembelian (Bahan Baku Masuk)</h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">Penerimaan barang dan penambahan stok otomatis</span>
            </div>
            <div className="flex gap-2">
              {!isReadOnly && (
                <label className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-pointer flex items-center gap-1.5 border border-slate-250 dark:border-slate-700">
                  <i data-lucide="file-input" className="w-3.5 h-3.5"></i> Import Excel
                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>
              )}
              <button 
                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>
              {!isReadOnly && (
                <button 
                  onClick={openModal}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/15 flex items-center gap-2"
                >
                  <i data-lucide="plus" className="w-3.5 h-3.5"></i> Catat Pembelian
                </button>
              )}
            </div>
          </div>

          {/* Filter Cabang SPPG */}
          <div className="bg-white dark:bg-slate-955 p-4 rounded-2xl border border-slate-150 dark:border-slate-850 flex items-end gap-4 text-xs font-semibold no-print shadow-sm">
            <div>
              <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Filter SPPG / Cabang</label>
              <input 
                type="text" 
                value={filterCreator} 
                onChange={(e) => setFilterCreator(e.target.value)} 
                placeholder="Cari SPPG/Lokasi..." 
                className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white w-48 text-xs font-semibold" 
              />
            </div>
            <button 
              onClick={() => setFilterCreator('')}

    // ==========================================
    // 9. MASTER CUSTOMER VIEW MODULE
    // ==========================================
    function CustomerModule({ customers, globalSearch, reloadData, logActivity, showToast, currentUser }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const [modalOpen, setModalOpen] = React.useState(null); // 'add', 'edit'
      const [editCustomer, setEditCustomer] = React.useState(null);

      // Fields
      const [name, setName] = React.useState('');
      const [company, setCompany] = React.useState('');
      const [phone, setPhone] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [address, setAddress] = React.useState('');

      const openModal = (mode, cust = null) => {
        if (mode === 'edit' && cust) {
          setEditCustomer(cust);
          setName(cust.name);
          setCompany(cust.company);
          setPhone(cust.phone);
          setEmail(cust.email);
          setAddress(cust.address);
          setModalOpen('edit');
        } else {
          setEditCustomer(null);
          setName('');
          setCompany('');
          setPhone('');
          setEmail('');
          setAddress('');
          setModalOpen('add');
        }
      };

      const handleSave = async (e) => {
        e.preventDefault();
        const data = {
          name,
          company,
          phone,
          email,
          address
        };

        if (modalOpen === 'edit') {
          data.id = editCustomer.id;
          await saveToStore('customers', data);
          await logActivity('Ubah Customer', `Customer ${name} (${company}) diperbarui.`);
          showToast(`Customer ${name} berhasil disimpan.`);
        } else {
          await saveToStore('customers', data);
          await logActivity('Tambah Customer', `Customer baru ${name} (${company}) ditambahkan.`);
          showToast(`Customer ${name} berhasil ditambahkan.`);
        }

        setModalOpen(null);
        reloadData();
      };

      const handleDelete = async (cust) => {
        if (confirm(`Apakah Anda yakin menghapus Customer ${cust.name}?`)) {
          await deleteFromStore('customers', cust.id);
          await logActivity('Hapus Customer', `Customer ${cust.name} (${cust.company}) dihapus.`);
          showToast(`Customer ${cust.name} telah dihapus.`, 'error');
          reloadData();
        }
      };

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Nama Pelanggan, Perusahaan, No. Telepon, Email, Alamat
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rName = row[0] ? String(row[0]).trim() : '';
              const rCompany = row[1] ? String(row[1]).trim() : '';
              const rPhone = row[2] ? String(row[2]).trim() : '';
              const rEmail = row[3] ? String(row[3]).trim() : '';
              const rAddress = row[4] ? String(row[4]).trim() : '';

              if (!rName) continue;

              const newCustomer = {
                name: rName,
                company: rCompany,
                phone: rPhone,
                email: rEmail,
                address: rAddress
              };

              const existing = customers.find(c => c.name.toLowerCase() === rName.toLowerCase());
              if (existing) {
                newCustomer.id = existing.id;
              }

              await saveToStore('customers', newCustomer);
              importedCount++;
            }

            await logActivity('Import Customer', `${importedCount} pelanggan diimpor dari file Excel.`);
            showToast(`${importedCount} pelanggan berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Nama Pelanggan', 'Perusahaan', 'No. Telepon', 'Email', 'Alamat']
        ];
        customers.forEach(c => {
          rows.push([
            c.name,
            c.company || '',
            c.phone || '',
            c.email || '',
            c.address || ''
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Customers');
        XLSX.writeFile(wb, 'Data_Customer_PT_AR.xlsx');
        logActivity('Export Customer', 'Data customer diexport ke Excel.');
        showToast('Data customer berhasil diexport ke Excel.');
      };

      const filtered = customers.filter(c => 
        c.name.toLowerCase().includes(globalSearch.toLowerCase()) ||
        c.company.toLowerCase().includes(globalSearch.toLowerCase())
      );

      return (

    // ==========================================
    // 10. INVOICE PENJUALAN VIEW MODULE
    // ==========================================
    function InvoiceJualModule({ invoices, customers, barangList, priceLists, poList, globalSearch, reloadData, logActivity, showToast, settings, currentUser }) {
      const isReadOnly = currentUser?.role === 'mitra';
      const isSppg = currentUser?.role === 'sppg';
      const canCreateInvoice = currentUser?.role === 'admin' || currentUser?.role === 'finance';
      const canDeleteInvoice = currentUser?.role === 'admin' || currentUser?.role === 'finance';
      const [modalOpen, setModalOpen] = React.useState(false);
      const [viewInvoice, setViewInvoice] = React.useState(null);
      const [confirmModalOpen, setConfirmModalOpen] = React.useState(null);
      const [feedbackText, setFeedbackText] = React.useState('');

      React.useEffect(() => {
        if ((modalOpen || viewInvoice || confirmModalOpen) && window.lucide) {
          setTimeout(() => {
            window.lucide.createIcons();
          }, 50);
        }
      }, [modalOpen, viewInvoice, confirmModalOpen]);

      // Fields
      const [invoiceNumber, setInvoiceNumber] = React.useState('');
      const [refPoId, setRefPoId] = React.useState('');
      const [customerId, setCustomerId] = React.useState('');
      const [invoiceDate, setInvoiceDate] = React.useState('');
      const [dueDate, setDueDate] = React.useState('');
      const [discount, setDiscount] = React.useState(0);
      const [taxRate, setTaxRate] = React.useState(2); // Pajak PT 2%
      const [createdByDetail, setCreatedByDetail] = React.useState('');
      const [fileTtdDirektur, setFileTtdDirektur] = React.useState('');
      const [fileStempel, setFileStempel] = React.useState('');
      const [items, setItems] = React.useState([{ barangId: '', qty: 1, price: 0, total: 0 }]);

      const handleFileTtdChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
          setFileTtdDirektur(reader.result);
        };
        reader.readAsDataURL(file);
      };

      const handleFileStempelChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
          setFileStempel(reader.result);
        };
        reader.readAsDataURL(file);
      };

      // Auto populate items based on PO receipts
      React.useEffect(() => {
        if (refPoId) {
          const po = poList.find(x => x.id === Number(refPoId));
          if (po) {
            setCustomerId(po.customerId || '');
            const receivedItems = [];
            po.items.forEach(it => {
              const totalRec = (po.receipts || []).reduce((sum, r) => {
                const match = r.items.find(x => x.barangId === it.barangId);
                return sum + (match ? Number(match.qtyReceived) : 0);
              }, 0);

              let qtyToInvoice = 0;
              if (po.receipts && po.receipts.length > 0) {
                qtyToInvoice = totalRec;
              } else if (po.status === 'Dikirim' || po.status === 'Selesai' || po.status === 'Lunas') {
                qtyToInvoice = it.qty;
              } else {
                qtyToInvoice = 0; // PO masih Belum diproses / Draft belum terkirim
              }

              if (qtyToInvoice > 0) {
                const matches = priceLists.filter(p => p.barangId === Number(it.barangId));
                let sellPrice = it.price || 0;
                if (matches.length > 0) {
                  matches.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
                  sellPrice = matches[0].hargaJual || 0;
                }
                receivedItems.push({
                  barangId: it.barangId,
                  qty: qtyToInvoice,
                  price: sellPrice,
                  total: qtyToInvoice * sellPrice
                });
              }
            });
            setItems(receivedItems);
          }
        }
      }, [refPoId, poList, priceLists]);

      // Filter States
      const [filterCreator, setFilterCreator] = React.useState('');

      const openModal = () => {
        const num = 'INV-' + new Date().getFullYear() + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(invoices.length + 1).padStart(4, '0');
        setInvoiceNumber(num);
        setRefPoId('');
        setCustomerId('');
        setInvoiceDate(new Date().toISOString().split('T')[0]);
        setDueDate(new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]);
        setDiscount(0);
        setTaxRate(2);
        setCreatedByDetail('');
        setFileTtdDirektur('');
        setFileStempel('');
        setItems([{ barangId: '', qty: 1, price: 0, total: 0 }]);
        setModalOpen(true);
      };

      const handleAddItem = () => {
        setItems([...items, { barangId: '', qty: 1, price: 0, total: 0 }]);
      };

      const handleRemoveItem = (index) => {
        if (items.length === 1) return;
        setItems(items.filter((_, idx) => idx !== index));
      };

      const handleItemChange = (index, field, value) => {
        const updated = [...items];
        updated[index][field] = value;

        // Auto price pull from price_lists
        if (field === 'barangId') {
          // Find latest effective price list
          const matches = priceLists.filter(p => p.barangId === Number(value));
          if (matches.length > 0) {
            // Sort by effective date descending
            matches.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
            updated[index].price = matches[0].hargaJual || 0;
          } else {
            updated[index].price = 0;
          }
        }

        const qty = Number(updated[index].qty) || 0;
        const price = Number(updated[index].price) || 0;
        updated[index].total = qty * price;

        setItems(updated);
      };

      // Calculate totals
      const subtotal = items.reduce((sum, item) => sum + (item.total || 0), 0);
      const taxAmount = Math.max(0, ((subtotal - discount) * taxRate) / 100);
      const grandTotal = Math.max(0, subtotal - discount + taxAmount);

      const handleSave = async (e) => {
        e.preventDefault();
        
        let finalCustomerId = customerId;
        if (!finalCustomerId && refPoId) {
          const po = poList.find(x => x.id === Number(refPoId));
          if (po && po.customerId) {
            finalCustomerId = po.customerId;
          } else {
            finalCustomerId = customers[0] ? customers[0].id : 1;
          }
        }

        if (!refPoId || !finalCustomerId || items.length === 0 || items.some(item => !item.barangId)) {
          const missing = [];
          if (!refPoId) missing.push("Referensi PO");
          if (!finalCustomerId) missing.push("Customer");
          if (items.length === 0) missing.push("Daftar Barang Kosong");
          if (items.some(item => !item.barangId)) missing.push("Barang tidak valid (tanpa ID)");
          alert('Gagal: Harap lengkapi data (' + missing.join(', ') + ')');
          return;
        }

        // Check stock availability
        let isStockAvailable = true;
        let warningMessage = '';

        for (const item of items) {
          const b = barangList.find(x => x.id === Number(item.barangId));
          if (b && b.stock < Number(item.qty)) {
            isStockAvailable = false;
            warningMessage = `Stok tidak mencukupi untuk ${b.name}. Stok tersisa: ${b.stock} ${b.unit}.`;
            break;
          }
        }

        if (!isStockAvailable) {
          showToast(warningMessage, 'error');
          return;
        }

        const data = {
          invoiceNumber,
          refPoId: Number(refPoId) || null,
          customerId: Number(finalCustomerId),
          invoiceDate,
          dueDate,
          discount: Number(discount),
          taxRate: Number(taxRate),
          createdByDetail,
          fileTtdDirektur,
          fileStempel,
          items: items.map(it => {
            const matches = priceLists.filter(p => p.barangId === Number(it.barangId));
            let unitHpp = 0;
            if (matches.length > 0) {
              matches.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
              unitHpp = matches[0].hargaBeli || 0;
            }
            return {
              barangId: Number(it.barangId),
              qty: Number(it.qty),
              price: Number(it.price),
              total: Number(it.total),
              hpp: Number(it.qty) * unitHpp
            };
          }),
          subtotal,
          taxAmount,
          grandTotal,
          hpp: items.reduce((sum, it) => {
            const matches = priceLists.filter(p => p.barangId === Number(it.barangId));
            let unitHpp = 0;
            if (matches.length > 0) {
              matches.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
              unitHpp = matches[0].hargaBeli || 0;
            }
            return sum + (Number(it.qty) * unitHpp);
          }, 0)
        };

        try {
          await saveInvoiceJualTransaction(data);

          // Update referenced PO status to 'Lunas' so SPPG & Finance see it as Lunas
          const refPo = poList.find(p => p.id === Number(refPoId));
          if (refPo) {
            const updatedPo = {
              ...refPo,
              status: 'Lunas',
              invoiceNumber: invoiceNumber
            };
            await saveToStore('po', updatedPo);
            await logActivity('Terbitkan Invoice & Pelunasan PO', `Finance menerbitkan Invoice ${invoiceNumber} untuk PO ${refPo.poNumber}. Status PO diupdate menjadi Lunas.`);
          }

          showToast(`Invoice ${invoiceNumber} berhasil disimpan. PO diupdate ke status Lunas.`);
          setModalOpen(false);
          reloadData();
        } catch (err) {
          showToast('Gagal menyimpan Invoice (Inkonsistensi data).', 'error');
        }
      };

      const handlePrintInvoice = (invoice) => {
        const cust = customers.find(c => c.id === invoice.customerId);
        const printWindow = window.open('', '_blank');
        if (!printWindow) return;

        const subtotal = invoice.subtotal || invoice.items.reduce((s, i) => s + (i.qty * (i.price || 0)), 0);
        const discount = invoice.discount || 0;
        const taxRate = invoice.taxRate || 2;
        const taxAmount = invoice.taxAmount || 0;
        const grandTotal = invoice.grandTotal || (subtotal - discount + taxAmount);

        const itemsRows = invoice.items.map((item, idx) => {
          const b = barangList.find(x => x.id === item.barangId);
          return '            <tr>' +
            '              <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center;">' + (idx + 1) + '</td>' +
            '              <td style="padding: 10px; border-bottom: 1px solid #e2e8f0;">' + (b ? b.name : 'Unknown Item') + '</td>' +
            '              <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center;">' + item.qty + ' ' + (b ? b.unit : '') + '</td>' +
            '              <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: right;">' + formatRupiah(item.price) + '</td>' +
            '              <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: right; font-weight: bold;">' + formatRupiah(item.total) + '</td>' +
            '            </tr>';
        }).join('\n');

        const htmlLines = [
          '<!DOCTYPE html>',
          '<html>',
          '<head>',
          '  <title>Cetak Invoice - ' + invoice.invoiceNumber + '</title>',
          '  <style>',

          '    .page-container { min-height: 98vh; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }',
          '    .content-upper { flex: 1; }',
          '    .header { display: flex; justify-content: space-between; border-bottom: 2px solid #0284c7; padding-bottom: 12px; margin-bottom: 20px; }',

          '    .info-table { width: 100%; margin-bottom: 20px; border-collapse: collapse; }',
          '    .info-table td { padding: 4px 0; vertical-align: top; }',
          '    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }',
          '    .items-table th { background: #f8fafc; padding: 10px; border: 1px solid #cbd5e1; text-align: left; text-transform: uppercase; font-size: 10px; color: #475569; }',
          '    .items-table td { padding: 10px; border: 1px solid #e2e8f0; }',
          '    .totals-table { float: right; width: 45%; margin-top: 10px; }',
          '    .totals-table td { padding: 6px; }',
          '    .terbilang-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-top: 15px; width: 50%; float: left; font-size: 11px; }',
          '    .footer { margin-top: auto; padding-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; }',
          '    @media print {',

          '      <div class="header">',
          '        <div>',

          '          <div style="color: #64748b; font-weight: 500; margin-top: 4px;">' + (settings.address || '') + '</div>',
          '          <div style="color: #94a3b8; font-size: 10px; font-weight: 600; margin-top: 2px;">Telp: ' + (settings.phone || '') + ' | Email: ' + (settings.email || '') + '</div>',
          '        </div>',
          '        <div style="text-align: right;">',
          '          <div style="font-size: 12px; font-weight: 800; color: #0284c7; letter-spacing: 1px; background: #f0f9ff; padding: 4px 12px; border-radius: 6px; border: 1px solid #bae6fd; display: inline-block;">FAKTUR INVOICE</div>',
          '          <div style="font-family: monospace; font-weight: 800; font-size: 14px; margin-top: 6px; color: #0f172a;">' + invoice.invoiceNumber + '</div>',

          '            <strong style="font-size: 14px; color: #0f172a;">' + (cust ? cust.name : '') + '</strong><br>',
          '            ' + (cust ? cust.company : '') + '<br>',

          '          </td>',
          '          <td style="width: 45%; text-align: right;">',
          '            <strong>Tanggal Invoice:</strong> ' + invoice.invoiceDate + '<br>',
          '            <strong style="color: #dc2626;">Jatuh Tempo:</strong> ' + invoice.dueDate + '<br>',
          '            <strong>Pembuat / SPPG:</strong> ' + (invoice.createdByDetail || 'Staff Keuangan') + '',
          '          </td>',
          '        </tr>',
          '      </table>',
          '      <table class="items-table">',
          '        <thead>',
          '          <tr>',
          '            <th style="width: 5%; text-align: center;">No</th>',
          '            <th>Nama Barang / Deskripsi</th>',
          '            <th style="width: 15%; text-align: center;">Kuantitas</th>',
          '            <th style="width: 20%; text-align: right;">Harga Satuan</th>',
          '            <th style="width: 20%; text-align: right;">Total</th>',
          '          </tr>',
          '        </thead>',
          '        <tbody>',
          itemsRows,
          '        </tbody>',
          '      </table>',
          '      <div class="terbilang-box">',
          '        <strong style="color: #64748b; font-size: 9px; text-transform: uppercase;">Terbilang:</strong><br>',
          '        <span style="font-weight: bold; font-style: italic; color: #334155;">"' + formatTerbilangRupiah(grandTotal) + '"</span>',
          '      </div>',
          '      <table class="totals-table">',
          '        <tr>',
          '          <td>Subtotal:</td>',
          '          <td style="text-align: right; font-weight: bold;">' + formatRupiah(subtotal) + '</td>',
          '        </tr>',
          '        <tr>',
          '          <td>Diskon:</td>',
          '          <td style="text-align: right; color: #dc2626; font-weight: bold;">-' + formatRupiah(discount) + '</td>',
          '        </tr>',
          '        <tr>',
          '          <td>Pajak PT (' + taxRate + '%):</td>',
          '          <td style="text-align: right; color: #d97706; font-weight: bold;">+' + formatRupiah(taxAmount) + '</td>',
          '        </tr>',
          '        <tr style="font-weight: bold; border-top: 2px solid #0f172a; font-size: 14px;">',
          '          <td style="padding-top: 8px;">Grand Total:</td>',
          '          <td style="text-align: right; padding-top: 8px; color: #0284c7;">' + formatRupiah(grandTotal) + '</td>',
          '        </tr>',
          '      </table>',
          '      <div style="clear: both;"></div>',
          '    </div>',
          '    <div class="footer">',
          '      <div style="text-align: center; width: 35%;">',
          '        <div style="font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 8px;">Penerima / Pelanggan,</div>',
          invoice.statusKonfirmasi === 'Diterima' 
            ? '        <div style="margin-top: 15px; color: #16a34a; font-weight: bold;">✓ Diterima Digital<br/><span style="font-size: 10px; font-style: italic; color: #64748b;">"' + (invoice.feedbackMitra || '') + '"</span></div>'
            : '        <div style="height: 50px;"></div>',
          '        <div style="border-bottom: 1px solid #94a3b8; font-weight: bold; margin-top: 10px; padding-bottom: 2px;">' + (cust ? cust.name : '__________________') + '</div>',
          '      </div>',
          '      <div style="text-align: center; width: 35%;">',
          '        <div style="font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Hormat Kami,</div>',
          '        <div style="height: 55px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 2px;">',
          invoice.fileTtdDirektur ? '          <img src="' + invoice.fileTtdDirektur + '" style="max-height: 50px;" />' : '',
          invoice.fileStempel ? '          <img src="' + invoice.fileStempel + '" style="max-height: 50px; opacity: 0.9;" />' : '',
          '        </div>',
          '        <div style="border-bottom: 1px solid #94a3b8; font-weight: bold; margin-top: 4px; padding-bottom: 2px;">PT AR Multi Karya (Direktur)</div>',
          '      </div>',
          '    </div>',
          '  </div>',
          '  <script>',
          '    window.onload = function() {',
          '      window.print();',
          '    }',
          '  <\/script>',
          '</body>',
          '</html>'
        ];

        printWindow.document.write(htmlLines.join('\n'));
        printWindow.document.close();
      };

      const handleDelete = async (inv) => {
        if (confirm(`Apakah Anda yakin menghapus invoice ${inv.invoiceNumber}? Tindakan ini akan mengembalikan stok barang.`)) {
          try {
            await deleteInvoiceJualTransaction(inv.id, inv.invoiceNumber, inv.items);
            showToast(`Invoice ${inv.invoiceNumber} dihapus. Stok disesuaikan kembali.`, 'error');
            reloadData();
          } catch(err) {
            showToast('Gagal menghapus invoice.', 'error');
          }
        }
      };

      const handleUploadPenerimaan = (invoiceId, e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
          const fileData = reader.result;
          const inv = invoices.find(i => i.id === invoiceId);
          if (inv) {
            const updated = { ...inv, filePenerimaan: fileData };
            await saveToStore('invoice_jual', updated);
            await logActivity('Upload Bukti Penerimaan', `Mengunggah bukti penerimaan barang untuk invoice ${inv.invoiceNumber}`);
            showToast('Bukti penerimaan barang berhasil disimpan.');
            reloadData();
          }
        };
        reader.readAsDataURL(file);
      };

      const handleConfirmReceipt = async (e) => {
        e.preventDefault();
        if (!confirmModalOpen) return;
        
        const updated = { 
          ...confirmModalOpen, 
          statusKonfirmasi: 'Diterima', 
          feedbackMitra: feedbackText || 'Diterima dengan baik.',
          tanggalDiterima: new Date().toISOString().split('T')[0]
        };
        
        await saveToStore('invoice_jual', updated);
        await logActivity('Konfirmasi Penerimaan', `Mitra mengkonfirmasi penerimaan untuk invoice ${confirmModalOpen.invoiceNumber}. Feedback: ${feedbackText || 'Diterima dengan baik.'}`);
        showToast('Konfirmasi penerimaan berhasil dikirim. Terima kasih!');
        
        setConfirmModalOpen(null);
        setFeedbackText('');
        reloadData();
      };

      // Import Excel using SheetJS
      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            // Expect headers: Nomor Invoice, Customer, Tanggal Invoice, Jatuh Tempo, Pembuat/SPPG, Subtotal, Diskon, Pajak PT, Grand Total
            let importedCount = 0;
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 2) continue;

              const rNumber = row[0] ? String(row[0]).trim() : '';
              const rCustomerName = row[1] ? String(row[1]).trim() : '';
              const rDate = row[2] ? String(row[2]).trim() : new Date().toISOString().split('T')[0];
              const rDueDate = row[3] ? String(row[3]).trim() : new Date().toISOString().split('T')[0];
              const rCreator = row[4] ? String(row[4]).trim() : '';
              const rSubtotal = row[5] ? Number(row[5]) : 0;
              const rDiscount = row[6] ? Number(row[6]) : 0;
              const rTaxAmount = row[7] ? Number(row[7]) : 0;
              const rGrandTotal = row[8] ? Number(row[8]) : 0;

              if (!rNumber) continue;

              let custId = customers[0] ? customers[0].id : 1;
              if (rCustomerName) {
                const matchedCust = customers.find(c => c.name.toLowerCase() === rCustomerName.toLowerCase());
                if (matchedCust) custId = matchedCust.id;
              }

              // Create default item matching first item in barang
              let bId = barangList[0] ? barangList[0].id : 1;
              const newInvoice = {
                invoiceNumber: rNumber,
                customerId: custId,
                invoiceDate: rDate,
                dueDate: rDueDate,
                createdByDetail: rCreator,
                subtotal: rSubtotal,
                discount: rDiscount,
                taxRate: 2,
                taxAmount: rTaxAmount,
                grandTotal: rGrandTotal,
                hpp: rSubtotal * 0.9, // Default estimate
                items: [{ barangId: bId, qty: 1, price: rSubtotal, total: rSubtotal, hpp: rSubtotal * 0.9 }]
              };

              const existing = invoices.find(inv => inv.invoiceNumber.toLowerCase() === rNumber.toLowerCase());
              if (existing) {
                newInvoice.id = existing.id;
              }

              await saveToStore('invoice_jual', newInvoice);
              importedCount++;
            }

            await logActivity('Import Invoice', `${importedCount} Invoice diimpor dari file Excel.`);
            showToast(`${importedCount} Invoice berhasil diimpor dari Excel.`);
            reloadData();
          } catch (err) {
            console.error(err);
            showToast('Gagal memproses file Excel.', 'error');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = ''; // clear input
      };

      // Export Excel using SheetJS
      const handleExportExcel = () => {
        const rows = [
          ['Nomor Invoice', 'Customer', 'Tanggal Invoice', 'Jatuh Tempo', 'Pembuat / SPPG', 'Subtotal', 'Diskon', 'Pajak PT (2%)', 'Grand Total']
        ];
        invoices.forEach(inv => {
          const cust = customers.find(c => c.id === inv.customerId);
          rows.push([
            inv.invoiceNumber,
            cust ? cust.name : '-',
            inv.invoiceDate,
            inv.dueDate,
            inv.createdByDetail || '',
            inv.subtotal,
            inv.discount || 0,
            inv.taxAmount || 0,
            inv.grandTotal
          ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sales Invoices');
        XLSX.writeFile(wb, 'Data_Invoice_Penjualan_PT_AR.xlsx');
        logActivity('Export Invoice', 'Data invoice penjualan diexport ke Excel.');
        showToast('Data invoice berhasil diexport ke Excel.');
      };

      const filtered = invoices.filter(inv => {
        const cust = customers.find(c => c.id === inv.customerId);
        
        // Security filter for scoped accounts (sppg / mitra linked to customerId)
        if (currentUser?.customerId) {
          if (inv.customerId !== currentUser.customerId) return false;
        } else {
          // Fallback legacy filters
          if (currentUser?.role === 'mitra') {
            if (!cust) return false;
            const match = cust.name.toLowerCase() === currentUser.username.toLowerCase() || 
                          cust.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
                          cust.company.toLowerCase().includes(currentUser.username.toLowerCase());
            if (!match) return false;
          }
          if (currentUser?.role === 'sppg') {
            if (inv.refPoId) {
              const po = poList.find(p => p.id === inv.refPoId);
              if (po) {
                const isCreatedByMe = po.createdBy === currentUser.username ||
                                    (po.createdByDetail && po.createdByDetail.toLowerCase().trim() === ('sppg ' + currentUser.username.toLowerCase().trim())) ||
                                    (currentUser?.username === 'sppgngawen' && po.createdByDetail && po.createdByDetail.toLowerCase().includes('ngawen'));
                if (!isCreatedByMe) return false;
              }
            }
          }
        }

        const matchesSearch = inv.invoiceNumber.toLowerCase().includes(globalSearch.toLowerCase()) ||
               (cust && cust.name.toLowerCase().includes(globalSearch.toLowerCase()));
               
        const matchesCreator = !filterCreator || 
                               (inv.createdByDetail && inv.createdByDetail.toLowerCase().includes(filterCreator.toLowerCase()));
                               
        return matchesSearch && matchesCreator;
      });

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex justify-between items-center no-print">
            <div>
              <h3 className="font-bold text-xs uppercase text-slate-400 tracking-wider">
                {(currentUser?.role === 'sppg' || currentUser?.role === 'mitra') ? 'Bukti Penerimaan Barang' : 'Invoice Penjualan (Sales Invoices)'}
              </h3>
              <span className="text-[10px] text-slate-450 font-semibold block mt-0.5">
                {(currentUser?.role === 'sppg' || currentUser?.role === 'mitra') 
                  ? 'Konfirmasi penerimaan barang kiriman dari PT AR Multi Karya' 
                  : 'Pengeluaran barang ke customer dengan pajak PT 2%'}
              </span>
            </div>
            <div className="flex gap-2">
              {canCreateInvoice && (
                <label className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl cursor-pointer flex items-center gap-1.5 border border-slate-250 dark:border-slate-700">
                  <i data-lucide="file-input" className="w-3.5 h-3.5"></i> Import Excel
                  <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
                </label>
              )}
              <button 
                onClick={handleExportExcel}
                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-semibold px-3 py-2.5 rounded-xl flex items-center gap-1.5 border border-slate-250 dark:border-slate-700"
              >
                <i data-lucide="file-output" className="w-3.5 h-3.5"></i> Export Excel
              </button>
              {canCreateInvoice && (
                <button 
                  onClick={openModal}
                  className="bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-primary-950/15 flex items-center gap-2"
                >
                  <i data-lucide="file-plus" className="w-3.5 h-3.5"></i> Buat Invoice (PO Terkonfirmasi)
                </button>
              )}
            </div>
          </div>

          {/* Filter Cabang SPPG */}
          <div className="bg-white dark:bg-slate-955 p-4 rounded-2xl border border-slate-150 dark:border-slate-850 flex items-end gap-4 text-xs font-semibold no-print shadow-sm">
            <div>
              <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Filter SPPG / Cabang</label>
              <input 
                type="text" 
                value={filterCreator} 
                onChange={(e) => setFilterCreator(e.target.value)} 
                placeholder="Cari SPPG/Lokasi..." 
                className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:border-primary-500 focus:outline-none dark:text-white w-48 text-xs font-semibold" 
              />
            </div>
            <button 
              onClick={() => setFilterCreator('')}
              className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-2 rounded-xl font-bold border border-slate-200 dark:border-slate-700"
            >
              Reset Filter
            </button>
          </div>

          <div className="bg-white dark:bg-slate-955 rounded-2xl border border-slate-150 dark:border-slate-855 shadow-sm overflow-hidden no-print">
            <table className="w-full text-left border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-900/60 border-b border-slate-100 dark:border-slate-855 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                  <th className="py-4 px-6">Nomor Invoice</th>
                  <th className="py-4 px-6">Referensi PO</th>
                  <th className="py-4 px-6">Pelanggan</th>
                  <th className="py-4 px-6">Tanggal Invoice</th>
                  <th className="py-4 px-6">Jatuh Tempo</th>
                  <th className="py-4 px-6">Pembuat / SPPG</th>
                  <th className="py-4 px-6">Pajak PT 2%</th>
                  <th className="py-4 px-6">Grand Total</th>
                  <th className="py-4 px-6">Bukti Penerimaan</th>
                  <th className="py-4 px-6 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 dark:divide-slate-900/50">
                {filtered.length === 0 ? (
                  <tr>
                    <td colSpan="10" className="py-8 text-center text-slate-400 font-medium">Tidak ada data invoice ditemukan.</td>
                  </tr>
                ) : (
                  filtered.map(inv => {
                    const cust = customers.find(c => c.id === inv.customerId);
                    const matchedPo = poList.find(p => p.id === inv.refPoId);
                    return (
                      <tr key={inv.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-900/10">
                        <td className="py-4 px-6 font-mono font-bold text-primary-600 dark:text-primary-400">{inv.invoiceNumber}</td>
                        <td className="py-4 px-6 font-mono font-semibold text-slate-700 dark:text-slate-300">{matchedPo ? matchedPo.poNumber : '-'}</td>
                        <td className="py-4 px-6 font-extrabold text-slate-855 dark:text-white">{cust ? cust.name : 'Unknown'}</td>
                        <td className="py-4 px-6 font-semibold text-slate-550">{inv.invoiceDate}</td>
                        <td className="py-4 px-6 font-semibold text-red-500">{inv.dueDate}</td>
                        <td className="py-4 px-6 font-extrabold text-slate-700 dark:text-slate-350">{inv.createdByDetail || '-'}</td>
                        <td className="py-4 px-6 font-semibold text-slate-650">{formatRupiah(inv.taxAmount)}</td>
                        <td className="py-4 px-6 font-extrabold text-slate-900 dark:text-white">{formatRupiah(inv.grandTotal)}</td>
                        <td className="py-4 px-6 font-semibold">
                          {currentUser?.role === 'mitra' ? (
                            <div>
                              {inv.statusKonfirmasi === 'Diterima' ? (
                                <div className="space-y-1">
                                  <span className="text-green-600 font-extrabold flex items-center gap-1">
                                    <i data-lucide="check-circle" className="w-3.5 h-3.5"></i> Diterima
                                  </span>
                                  <span className="text-[10px] text-slate-400 block font-normal leading-normal italic max-w-[150px] truncate" title={inv.feedbackMitra}>
                                    "{inv.feedbackMitra}"
                                  </span>
                                  <span className="text-[9px] text-slate-450 block font-bold font-mono">
                                    {inv.tanggalDiterima}
                                  </span>
                                </div>
                              ) : (
                                <button 
                                  onClick={() => {
                                    setConfirmModalOpen(inv);
                                    setFeedbackText('');
                                  }}
                                  className="bg-green-600 hover:bg-green-700 text-white px-2.5 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider shadow-sm flex items-center gap-1"
                                >
                                  <i data-lucide="check" className="w-3 h-3"></i> Konfirmasi Terima
                                </button>
                              )}
                            </div>
                          ) : (
                            <div>
                              {inv.filePenerimaan ? (
                                <div className="flex items-center gap-2">
                                  <a 
                                    href={inv.filePenerimaan} 
                                    download={`TandaTerima_${inv.invoiceNumber}`}
                                    className="text-primary-600 hover:text-primary-750 font-bold flex items-center gap-1"
                                  >
                                    <i data-lucide="download" className="w-3.5 h-3.5"></i> Unduh Bukti
                                  </a>
                                  {isSppg && (
                                    <label className="text-slate-400 hover:text-primary-600 cursor-pointer text-[10px] underline">
                                      Ganti
                                      <input 
                                        type="file" 
                                        accept="image/*,.pdf" 
                                        onChange={(e) => handleUploadPenerimaan(inv.id, e)} 
                                        className="hidden" 
                                      />
                                    </label>
                                  )}
                                </div>
                              ) : (
                                <div>
                                  {inv.statusKonfirmasi === 'Diterima' ? (
                                    <div className="space-y-1">
                                      <span className="text-green-600 font-extrabold flex items-center gap-1">
                                        <i data-lucide="check-circle" className="w-3.5 h-3.5"></i> Konfirmasi Digital
                                      </span>
                                      <span className="text-[10px] text-slate-400 block font-normal leading-normal italic max-w-[150px] truncate" title={inv.feedbackMitra}>
                                        "{inv.feedbackMitra}"
                                      </span>
                                      <span className="text-[9px] text-slate-450 block font-bold font-mono">
                                        {inv.tanggalDiterima}
                                      </span>
                                    </div>
                                  ) : isSppg ? (
                                    <label className="bg-primary-50 hover:bg-primary-100 text-primary-700 dark:bg-primary-955/20 dark:text-primary-400 px-2.5 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer inline-flex items-center gap-1 border border-primary-100 dark:border-primary-900">
                                      <i data-lucide="upload" className="w-3 h-3"></i> Upload Bukti
                                      <input 
                                        type="file" 
                                        accept="image/*,.pdf" 
                                        onChange={(e) => handleUploadPenerimaan(inv.id, e)} 
                                        className="hidden" 
                                      />
                                    </label>
                                  ) : (
                                    <span className="text-slate-400 font-medium">-</span>
                                  )}
                                </div>
                              )}
                            </div>
                          )}
                        </td>
                        <td className="py-4 px-6 text-right">
                          <div className="inline-flex gap-2 items-center">
                            <button 
                              onClick={() => handlePrintInvoice(inv)}
                              title="Unduh / Cetak Invoice A4"
                              className="bg-green-50 dark:bg-green-955/20 text-green-600 hover:bg-green-100 px-2.5 py-1.5 rounded-lg border border-green-200 font-extrabold text-[10px] flex items-center gap-1 shadow-sm"
                            >
                              <i data-lucide="download" className="w-3.5 h-3.5"></i> Unduh Invoice
                            </button>
                            {canDeleteInvoice && (
                              <button 
                                onClick={() => handleDelete(inv)}
                                className="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-500 hover:text-red-655 hover:border-red-200"
                              >
                                <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>

          {/* Form Modal */}
          {modalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-950 w-full max-w-3xl rounded-2xl shadow-xl border border-slate-200 dark:border-slate-850 overflow-hidden animate-fade-in flex flex-col max-h-[90vh]">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-855 flex justify-between items-center">
                  <h4 className="font-bold text-xs uppercase tracking-wider text-slate-500">Buat Faktur/Invoice Penjualan</h4>
                  <button onClick={() => setModalOpen(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                </div>
                
                <form onSubmit={handleSave} className="p-6 flex-1 overflow-y-auto space-y-4 text-xs font-semibold">
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Nomor Invoice</label>
                      <input type="text" readOnly value={invoiceNumber} className="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white font-mono" />
                    </div>
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Tanggal Terbit *</label>
                      <input type="date" required value={invoiceDate} onChange={(e) => setInvoiceDate(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white" />
                    </div>
                    <div>
                      <label className="block text-[10px] text-slate-400 uppercase tracking-wide mb-1">Jatuh Tempo *</label>
                      <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2 rounded-xl focus:outline-none dark:text-white" />
                    </div>
                  </div>

function RekapLabaRugiModule({ invoices, buktiPembelian, globalSearch, settings, currentUser }) {
      const [startDate, setStartDate] = React.useState('');
      const [endDate, setEndDate] = React.useState('');
      const [labaRugiMode, setLabaRugiMode] = React.useState(currentUser?.role === 'mitra' ? 'mitra' : 'standard');

      // Manual Inputs for Mitra Mode
      const [gajiFinance, setGajiFinance] = React.useState(1250000); // 5,000,000 / 4 portion
      const [penerimaManfaat, setPenerimaManfaat] = React.useState(0);

      // Helper function to set filter to current week (Monday - Saturday)
      const setThisWeekFilter = () => {
        const today = new Date();
        const currentDay = today.getDay(); // 0: Sun, 1: Mon, ...
        // Monday is day 1
        const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
        const monday = new Date(today);
        monday.setDate(today.getDate() + distanceToMonday);
        
        const saturday = new Date(monday);
        saturday.setDate(monday.getDate() + 5); // Monday + 5 = Saturday
        
        setStartDate(monday.toISOString().split('T')[0]);
        setEndDate(saturday.toISOString().split('T')[0]);
      };

      // Filter functions
      const filteredInvoices = invoices.filter(inv => {
        if (!inv.invoiceDate) return true;
        if (startDate && inv.invoiceDate < startDate) return false;
        if (endDate && inv.invoiceDate > endDate) return false;
        return true;
      });

      const filteredBukti = buktiPembelian.filter(b => {
        if (!b.receiptDate) return true;
        if (startDate && b.receiptDate < startDate) return false;
        if (endDate && b.receiptDate > endDate) return false;
        return true;
      });

      // Standard Calculations
      const totalRevenue = filteredInvoices.reduce((sum, item) => sum + (item.subtotal - (item.discount || 0)), 0);
      const totalHpp = filteredInvoices.reduce((sum, item) => sum + (item.hpp || 0), 0);
      const labaKotorStandard = totalRevenue - totalHpp;
      const totalTaxStandard = filteredInvoices.reduce((sum, item) => sum + (item.taxAmount || 0), 0);
      const netProfitStandard = labaKotorStandard - totalTaxStandard;
      const totalPembelianStandard = filteredBukti.reduce((sum, b) => {
        return sum + b.items.reduce((itemSum, item) => itemSum + (item.qty * item.unitCost), 0);
      }, 0);

      // Helper timezone-independent date day parser
      const getDayOfWeek = (dateStr) => {
        if (!dateStr) return -1;
        const [year, month, day] = dateStr.split('-').map(Number);
        const date = new Date(year, month - 1, day);
        return date.getDay(); // 0: Sun, 1: Mon, 2: Tue, 3: Wed, 4: Thu, 5: Fri, 6: Sat
      };

      const daysName = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

      // Mitra Calculations
      // Monday (1) to Saturday (6) breakdown
      const dailyStats = [1, 2, 3, 4, 5, 6].map(dayIndex => {
        const name = daysName[dayIndex];
        
        const dayInvoices = filteredInvoices.filter(inv => getDayOfWeek(inv.invoiceDate) === dayIndex);
        const dayBukti = filteredBukti.filter(b => getDayOfWeek(b.receiptDate) === dayIndex);
        
        const penjualan = dayInvoices.reduce((sum, item) => sum + (item.subtotal - (item.discount || 0)), 0);
        const pembelian = dayBukti.reduce((sum, b) => {
          return sum + b.items.reduce((itemSum, item) => itemSum + (item.qty * item.unitCost), 0);
        }, 0);
        const laba = penjualan - pembelian;
        
        return {
          name,
          penjualan,
          pembelian,
          laba
        };
      });

      const totalDailyPembelian = dailyStats.reduce((sum, item) => sum + item.pembelian, 0);
      const totalDailyPenjualan = dailyStats.reduce((sum, item) => sum + item.penjualan, 0);
      const labaKotorMitra = totalDailyPenjualan - totalDailyPembelian;

      const pajakPTMitra = labaKotorMitra > 0 ? labaKotorMitra * 0.02 : 0;
      const potonganPenerima = Number(penerimaManfaat) * 100;
      const labaBersihMitra = Math.max(0, labaKotorMitra - pajakPTMitra - Number(gajiFinance) - potonganPenerima);

      // Bagi Hasil shares
      const perMitra = labaBersihMitra * 0.10;

        };

        e.preventDefault();

        showToast('Koneksi database MySQL berhasil diperbarui.');
        reloadData();

      const handleSaveSupabase = (e) => {
        e.preventDefault();
        let cleanedUrl = sUrl.trim();
        // Hapus trailing slash jika ada
        if (cleanedUrl.endsWith('/')) {
          cleanedUrl = cleanedUrl.slice(0, -1);
        }
        // Hapus path /rest/v1 jika tidak sengaja ter-copy
        if (cleanedUrl.endsWith('/rest/v1')) {
          cleanedUrl = cleanedUrl.slice(0, -8);
        }
        // Hapus trailing slash lagi setelah membersihkan /rest/v1 (untuk jaga-jaga)
        if (cleanedUrl.endsWith('/')) {
          cleanedUrl = cleanedUrl.slice(0, -1);
        }
        localStorage.setItem('pt_ar_supabase_url', cleanedUrl);
        localStorage.setItem('pt_ar_supabase_key', sKey.trim());
